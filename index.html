<script type="module">
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.4';

  // ───────────────────────────────────────────────────────────────────────
  // Config
  //
  // We ship a single quantized ONNX file (model_quantized.onnx, ~22 MB).
  // dtype: 'q8' tells transformers.js v3 to load that exact filename.
  // Using any other dtype (e.g. 'fp32' → model.onnx) would 404; on
  // Cloudflare Pages a 404 is served as HTML, which the ONNX runtime
  // then tries to parse as protobuf and fails with the cryptic
  // "Failed to load model because protobuf parsing failed" error.
  // ───────────────────────────────────────────────────────────────────────
  env.allowLocalModels = true;
  env.allowRemoteModels = false;
  env.localModelPath = '/models/';
  env.useBrowserCache = true;

  // ───────────────────────────────────────────────────────────────────────
  // ONNX runtime tuning — iOS-safe defaults.
  //
  // iOS Safari does not give pages cross-origin isolation (no SAB), so
  // any attempt to spawn ONNX worker threads either no-ops or blows up
  // mid-init. Pinning numThreads = 1 keeps the runtime on the main
  // WASM execution path everywhere — slightly slower on desktop, but
  // dramatically more reliable on iOS. simd is still enabled (works
  // fine in Safari 16+); proxy=false keeps everything on the main
  // thread so transformers.js doesn't try to message a worker that
  // can't be created.
  // ───────────────────────────────────────────────────────────────────────
  try {
    if (env.backends && env.backends.onnx && env.backends.onnx.wasm) {
      env.backends.onnx.wasm.numThreads = 1;
      env.backends.onnx.wasm.proxy = false;
      // simd defaults to true; we don't override it.
    }
  } catch (e) { console.warn('Failed to tune ONNX backend', e); }

  const MODEL_ID = 'sentence-transformers/all-MiniLM-L6-v2';
  const MODEL_DTYPE = 'q8';
  // Versioned URL: bump when search-embeddings.json content changes so
  // any client (especially iOS Safari) can't serve a stale cached body
  // alongside a freshly-fetched index.html. The number must match the
  // committed file's content; see _headers for the fallback short TTL.
  // v2: regenerated from scripts/search_phrases.json with curated examples
  //     and 6-digit float precision (file size 3.7 MB → 1.75 MB).
  const EMBEDDINGS_VERSION = '2';
  const EMBEDDINGS_URL = `/search-embeddings.json?v=${EMBEDDINGS_VERSION}`;
  const SIMILARITY_THRESHOLD = 0.30;   // below this, fall back to DuckDuckGo
  // 220 ms (was 150) is the iOS-tuned middle ground: fast enough that the
  // hint feels live to a typist, slow enough that a fast typist generates
  // ~2 inferences for a 10-char query instead of ~10. Each WASM inference
  // briefly grows the WASM heap; reducing call count was the single biggest
  // lever for the iOS "tab dies after typing for a minute" reports.
  const INPUT_DEBOUNCE_MS = 220;
  // Skip the model entirely for ultra-short queries — 0–1 chars never
  // match a route confidently, and we'd just be allocating WASM tensors
  // for no signal. Bangs and direct-URL detection still run normally
  // (they're rule-based and free).
  const MIN_QUERY_LEN_FOR_MODEL = 2;
  const FETCH_TIMEOUT_MS = 30_000;     // give up on stalled embeddings fetch
  const MODEL_LOAD_RETRIES = 2;        // transient init failures only
  const MODEL_LOAD_RETRY_BASE_MS = 800;
  // After this many query inferences, dispose + recreate the pipeline.
  // Each ONNX inference can grow the WASM heap a few KB; without this,
  // a long session of typing slowly drifts the page toward the iOS
  // WebContent memory ceiling. Recreation reads the model from
  // IndexedDB cache (no network), so it's a ~100 ms reset, scheduled
  // during idle so the user never feels it.
  const INFERENCES_PER_RECYCLE = 40;

  // ───────────────────────────────────────────────────────────────────────
  // Mobile / desktop split: live inference only on desktop.
  //
  // The 22 MB ONNX model + WASM runtime live on the main thread. Each
  // keystroke during typing fires a fresh inference, which incrementally
  // grows the WASM heap on iOS Safari. After enough inferences the tab
  // crosses the WebContent memory ceiling and gets killed (the source
  // of the "A problem repeatedly occurred" interstitial).
  //
  // The simplest, most decisive fix: on mobile, never run semantic
  // inference during typing. Bang shortcuts (`!yt`) and direct-URL
  // detection (`github.com`) still match live because they're cheap
  // rule-based regex. Pressing Enter still runs the model exactly
  // once and routes — matching the `?q=` redirect path that users
  // already report as reliable on iOS.
  //
  // Desktop keeps the original live-typing loop: it has the headroom,
  // and the immediate route preview is the on-device-ML demo's
  // headline UX.
  //
  // The matcher is consulted at call-time, not cached, so a desktop
  // user dragging their browser narrow (or rotating an iPad) is
  // routed through whichever experience matches their current layout.
  // ───────────────────────────────────────────────────────────────────────
  const mobileMedia = window.matchMedia('(max-width: 767px)');
  // Read the route-delay countdown from CSS so the visual progress bar
  // and the redirect setTimeout can never drift out of sync.
  const ROUTE_DELAY_MS = (() => {
    const v = getComputedStyle(document.documentElement)
      .getPropertyValue('--route-delay-ms').trim();
    const n = parseFloat(v);
    if (!Number.isFinite(n) || n <= 0) return 1500;
    return v.endsWith('ms') ? n : n * 1000;       // s → ms
  })();

  const engines = {
    'ddg':         { name: 'DuckDuckGo (html)', color: '#DE5833', url: q => `https://html.duckduckgo.com/html/?q=${q}` },
    'bing-images': { name: 'Bing Images',   color: '#008373', url: q => `https://www.bing.com/images/search?q=${q}` },
    'perplexity':  { name: 'Perplexity',    color: '#20B2AA', url: q => `https://www.perplexity.ai/search?q=${q}` },
    'grok':        { name: 'Grok',          color: '#ffffff', url: q => `https://grok.com/?q=${q}` },
    'maps':        { name: 'Google Maps',   color: '#4285F4', url: q => `https://maps.google.com/maps?q=${q}` },
    'youtube':     { name: 'YouTube',       color: '#FF0000', url: q => `https://www.youtube.com/results?search_query=${q}` },
    'wirecutter':  { name: 'Wirecutter',    color: '#326891', url: q => `https://www.nytimes.com/wirecutter/search/?s=${q}` },
    // Hacker News via Algolia. Default to past-month + popularity-sorted
    // stories — that's the high-signal slice (front-page-grade discussion
    // from the last 30 days), not the all-time firehose. Users who want
    // the full archive can always tweak the filters on the destination.
    'hn':          { name: 'Hacker News',   color: '#FF6600', url: q => `https://hn.algolia.com/?dateRange=pastMonth&page=0&prefix=false&query=${q}&sort=byPopularity&type=story` },
    'wolfram':     { name: 'Wolfram Alpha', color: '#DA0E1A', url: q => `https://www.wolframalpha.com/input/?i=${q}` },
    'direct':      { name: 'Direct Link',   color: '#00ff00', url: q => q.startsWith('http') ? q : `https://${q}` }
  };

  // Bang shortcuts (always win over semantic routing)
  const BANG_MAP = {
    yt: 'youtube',     y: 'youtube',
    wc: 'wirecutter',  nyt: 'wirecutter',
    m: 'maps',         map: 'maps',
    i: 'bing-images',  img: 'bing-images',
    p: 'perplexity',   px: 'perplexity',
    g: 'grok',         gr: 'grok',
    hn: 'hn',          h: 'hn',
    w: 'wolfram',      wa: 'wolfram',
    d: 'ddg',          ddg: 'ddg'
  };

  const DOMAIN_RE    = /^[a-z0-9]+([\-\.][a-z0-9]+)*\.[a-z]{2,10}(:[0-9]{1,5})?(\/.*)?$/i;
  const LOCALHOST_RE = /^localhost(:[0-9]{1,5})?(\/.*)?$/i;

  // ───────────────────────────────────────────────────────────────────────
  // Keyword routing rules
  //
  // Used as a fallback when the embedding model isn't available
  // (low-memory device, repeated cold-load crashes, explicit ?lite=1
  // opt-in). Routes by deterministic keyword matching — no model, no
  // WASM heap, no network beyond static page load.
  //
  // Each rule contributes its `weight` to the engine's score if ANY of
  // its `kw` strings matches the query. The engine with the highest
  // total wins; ties go to the rule earlier in the list (engines
  // declared first); below MIN_KEYWORD_SCORE we fall back to DDG.
  //
  // Single-word `kw` entries match on word boundaries (so "code"
  // doesn't match "decode"). Phrases with spaces or special chars
  // (`sin(`, `near me`, `pull request`) match as substrings — already
  // specific enough that false positives are rare.
  //
  // Each rule's keywords share one weight: matching three keywords from
  // one rule gives the same score as matching one. The escalation comes
  // from declaring multiple rules per engine at different specificity
  // levels (a 4-weight phrase rule plus a 2-weight noun rule plus a
  // 1-weight common-word rule).
  // ───────────────────────────────────────────────────────────────────────
  const KEYWORD_RULES = [
    // ── youtube ─────────────────────────────────────────────────────
    { engine: 'youtube', weight: 5, kw: ['music video', 'official video', 'official audio', 'full album', 'live concert', 'live stream', 'lyric video', 'cover song', 'guitar tutorial'] },
    { engine: 'youtube', weight: 3, kw: ['lofi', 'beats', 'remix', 'edm mix', 'hip hop', 'mashup', 'concert footage', 'unboxing'] },
    { engine: 'youtube', weight: 1, kw: ['music', 'song', 'songs', 'video', 'videos', 'watch', 'concert', 'playlist', 'channel', 'episode', 'trailer', 'soundtrack', 'remixes', 'tiktok', 'shorts'] },

    // ── hacker news ─────────────────────────────────────────────────
    { engine: 'hn', weight: 5, kw: ['show hn', 'ask hn', 'hacker news', 'thoughts on', 'discussion of', 'is dead', 'is still relevant', 'y combinator', 'yc startup', 'show notes'] },
    { engine: 'hn', weight: 3, kw: ['startup', 'founder', 'vc funding', 'open source project', 'engineering blog', 'post mortem', 'rfc', 'rant about', 'why we', 'we built', 'lessons learned'] },
    { engine: 'hn', weight: 2, kw: ['react', 'pytorch', 'tensorflow', 'nextjs', 'fastapi', 'transformers', 'langchain', 'llama.cpp', 'huggingface', 'rust crate', 'npm package', 'python library', 'sdk'] },

    // ── wolfram ─────────────────────────────────────────────────────
    { engine: 'wolfram', weight: 5, kw: ['integral of', 'derivative of', 'limit of', 'solve for', 'taylor series', 'fourier transform', 'laplace transform', 'plot of', 'eigenvalues of', 'eigenvectors of', 'roots of', 'expand the', 'simplify the'] },
    { engine: 'wolfram', weight: 3, kw: ['integrate', 'differentiate', 'eigenvalue', 'eigenvector', 'theorem', 'simplify', 'factorize', 'mod arithmetic', 'partial derivative', 'definite integral'] },
    { engine: 'wolfram', weight: 2, kw: ['integral', 'derivative', 'sin(', 'cos(', 'tan(', 'log(', 'sqrt(', 'ln(', '^2', '^3', 'matrix', 'vector field', 'cross product', 'dot product'] },

    // ── wirecutter ──────────────────────────────────────────────────
    { engine: 'wirecutter', weight: 5, kw: ['best wireless', 'best mechanical', 'best budget', 'best cheap', 'best of 2024', 'best of 2025', 'wirecutter pick', 'noise cancelling', 'standing desk', 'office chair', 'usb-c cable', 'usb c cable'] },
    { engine: 'wirecutter', weight: 3, kw: ['where to buy', 'buy', 'purchase', 'wirecutter', 'budget pick', 'review of', 'recommendations for', 'gift guide'] },
    { engine: 'wirecutter', weight: 2, kw: ['headphones', 'earbuds', 'mechanical keyboard', 'gaming mouse', 'monitor', 'webcam', 'mattress', 'hdmi cable', 'power bank', 'travel adapter', 'french press', 'air purifier', 'vacuum', 'humidifier'] },

    // ── maps ────────────────────────────────────────────────────────
    { engine: 'maps', weight: 5, kw: ['near me', 'nearby', 'directions to', 'how far is', 'distance to', 'gas stations', 'urgent care', 'open now', 'route to', 'driving directions'] },
    { engine: 'maps', weight: 3, kw: ['downtown', 'closest', 'best restaurants in', 'restaurants in', 'cafes in', 'gyms in'] },
    { engine: 'maps', weight: 1, kw: ['restaurant', 'restaurants', 'cafe', 'gym', 'mall', 'airport', 'pharmacy', 'hospital', 'park', 'museum', 'station', 'pizzeria', 'sushi'] },

    // ── bing-images ─────────────────────────────────────────────────
    { engine: 'bing-images', weight: 5, kw: ['image of', 'photo of', 'picture of', 'screenshot of', 'wallpaper of', 'high resolution photo', 'high res image'] },
    { engine: 'bing-images', weight: 3, kw: ['wallpaper', 'wallpapers', 'lockscreen', 'background image', 'desktop background', 'phone wallpaper'] },
    { engine: 'bing-images', weight: 1, kw: ['image', 'images', 'photo', 'photos', 'picture', 'pictures', 'gif', 'meme'] },

    // ── perplexity ──────────────────────────────────────────────────
    { engine: 'perplexity', weight: 5, kw: ['pros and cons', 'tradeoffs between', 'difference between', 'comparison of', 'detailed comparison', 'literature review', 'research the', 'in depth analysis', 'overview of', 'history of'] },
    { engine: 'perplexity', weight: 3, kw: ['explain', 'summarize', 'tldr', 'tl;dr', 'compare', 'how does', 'why does', 'why is', 'walk me through', 'breakdown of'] },

    // ── grok ────────────────────────────────────────────────────────
    { engine: 'grok', weight: 5, kw: ['write a', 'write me a', 'tell me a joke', 'tell me a story', 'compose a', 'roast my', 'in the style of', 'dad joke', 'knock knock joke', 'pretend you are'] },
    { engine: 'grok', weight: 3, kw: ['haiku', 'limerick', 'sonnet', 'poem about', 'rap about', 'roleplay as', 'witty tweet'] },
  ];
  /** Below this score, fall back to DDG. Tuned so that a single
   *  weight-1 match isn't enough to commit; you need a strong
   *  signal (one weight-2+ rule, or two weight-1 rules). */
  const MIN_KEYWORD_SCORE = 2;

  /** True when the keyword passed to KEYWORD_RULES is a bare word —
   *  needs word-boundary anchoring so "code" doesn't match "decode". */
  const _BARE_WORD_RE = /^[a-z0-9]+$/i;

  /**
   * Score `query` against the keyword rules and return the best engine
   * key, or null if no rule scored at or above MIN_KEYWORD_SCORE.
   * Used by `classify()` whenever the model isn't usable (loading, in
   * keyword-mode fallback, or load-failed).
   */
  function classifyKeywords(query) {
    if (!query) return null;
    const padded = ' ' + query.toLowerCase().trim() + ' ';
    /** @type {Map<string, number>} */
    const scores = new Map();
    for (const rule of KEYWORD_RULES) {
      let matched = false;
      for (const kw of rule.kw) {
        const needle = _BARE_WORD_RE.test(kw) ? ` ${kw} ` : kw.toLowerCase();
        if (padded.indexOf(needle) >= 0) { matched = true; break; }
      }
      if (matched) {
        scores.set(rule.engine, (scores.get(rule.engine) || 0) + rule.weight);
      }
    }
    let bestKey = null, bestScore = 0;
    for (const [engine, score] of scores) {
      if (score > bestScore) { bestScore = score; bestKey = engine; }
    }
    return bestScore >= MIN_KEYWORD_SCORE ? bestKey : null;
  }

  // ───────────────────────────────────────────────────────────────────────
  // DOM
  // ───────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const search         = $('search');
  const hint           = $('hint');
  const overlay        = $('overlay');
  const display        = $('engine-display');
  const progress       = $('progress');
  const cancel         = $('cancel');
  const statusDot      = $('status');
  const loadingOverlay = $('loading');
  const scoresPanel    = $('scores');
  const errorBanner    = $('error-banner');
  const shortcutsOverlay = $('shortcuts-overlay');
  const themeToggle    = $('theme-toggle');

  // ───────────────────────────────────────────────────────────────────────
  // Global error handlers
  //
  // We never want a stray unhandled rejection or an uncaught error inside
  // a transformers.js worker to take down the page silently. These are
  // last-ditch logs (no network — privacy-by-design) plus a status-dot
  // tooltip update so power users notice. The router itself already
  // degrades to DDG on inference failure, so we don't need to mutate the
  // model state from here.
  // ───────────────────────────────────────────────────────────────────────
  window.addEventListener('error', e => {
    // Filter out non-page errors (broken external <img>/<script>).
    if (e && e.target && e.target !== window) return;
    console.error('Search router: uncaught error', e.error || e.message);
  });
  window.addEventListener('unhandledrejection', e => {
    console.error('Search router: unhandled rejection', e.reason);
  });

  // ───────────────────────────────────────────────────────────────────────
  // Mobile keyboard awareness
  //
  // On iOS Safari (and older Chromes that don't honor
  // `interactive-widget=resizes-content`), the soft keyboard does NOT
  // shrink the layout viewport — `position: fixed` elements stay anchored
  // to the layout viewport and end up hidden behind the keyboard.
  //
  // We use the visualViewport API to compute the obscured bottom inset
  // and expose it as a CSS variable, which `.scores-panel` and
  // `.status-dot` add to their `bottom` offset.
  // ───────────────────────────────────────────────────────────────────────
  const vv = window.visualViewport;
  /* Mark the body as `data-keyboard="open"` whenever something (the
     soft keyboard, the iOS find-bar, etc.) is eating non-trivial space
     at the bottom of the viewport. CSS uses this to hide the footer
     links on mobile so they don't crash into the inline scores chips. */
  function setKeyboardOpen(isOpen) {
    if (isOpen) {
      document.body.dataset.keyboard = 'open';
    } else {
      delete document.body.dataset.keyboard;
    }
  }
  if (vv) {
    const KEYBOARD_INSET_THRESHOLD_PX = 120;
    const updateKeyboardInset = () => {
      const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty('--keyboard-inset', inset + 'px');
      setKeyboardOpen(inset > KEYBOARD_INSET_THRESHOLD_PX);
    };
    vv.addEventListener('resize', updateKeyboardInset);
    vv.addEventListener('scroll', updateKeyboardInset);
    updateKeyboardInset();
  }

  // ───────────────────────────────────────────────────────────────────────
  // State
  // ───────────────────────────────────────────────────────────────────────
  let extractor = null;
  let routes = [];                                       // [{ key, vectors: Float32Array[] }]
  let modelReady = false;
  let modelFailed = false;
  let routeTimer = null;
  /** @type {Promise<boolean>}  Resolves true on success, false on failure;
   *  never rejects. ?q= redirect awaits this instead of polling. */
  let modelLoadPromise = null;
  /** Latches true the first time the model finishes loading. Subsequent
   *  reloads (visibility-shown re-init, periodic pipeline recycle) gate
   *  on this so they stay silent — no loading overlay, no error banner,
   *  no crash-loop sentinel churn. The user already paid the loading UI
   *  cost on cold boot; they don't need to see it again. */
  let modelEverLoaded = false;
  /** Set true by the bfcache pageshow handler so the pending `?q=`
   *  redirect IIFE doesn't fire after we've already cleared the URL
   *  and surfaced the input to the user. Set once, never reset. */
  let pendingRedirectAborted = false;
  /** Keyword-only mode. When true, classify() never runs the model;
   *  every non-rule query goes through `classifyKeywords()` and falls
   *  back to DDG when nothing matches. The status dot turns purple.
   *
   *  Activation policy (any one is sufficient):
   *    1. `?lite=1` URL param — explicit user opt-in or deep link
   *       from a "this site keeps crashing on my phone" support reply.
   *    2. `navigator.deviceMemory <= 1` — proactive bail-out on
   *       Android Go-class devices (≤ 1 GB RAM). Doesn't fire on iOS
   *       (Safari doesn't expose `deviceMemory`); iOS relies on (3).
   *    3. Crash-loop guard — ≥ 2 unfinished cold loads in the same
   *       session. Catches us 1 strike before iOS's "A problem
   *       repeatedly occurred" interstitial would fire (~3 strikes).
   *    4. Model-load failure after retries — `initModel()` exhausts
   *       transient retries or hits a deterministic 4xx.
   *
   *  Never auto-deactivates — once the page is in keyword mode, it
   *  stays until the user explicitly Retries or reloads. */
  let keywordMode = false;
  const _params = new URLSearchParams(location.search);
  const qParam = _params.get('q');
  const isRedirecting = qParam !== null;
  if (_params.get('lite') === '1') {
    keywordMode = true;
    console.log('Search router: keyword mode (?lite=1 opt-in)');
  } else if (typeof navigator.deviceMemory === 'number' && navigator.deviceMemory <= 1) {
    keywordMode = true;
    console.log(`Search router: keyword mode (low-memory device, ${navigator.deviceMemory} GB)`);
  }

  // ───────────────────────────────────────────────────────────────────────
  // Model + embeddings loader
  //
  // Returns a never-rejecting Promise<boolean> so callers can `await` it
  // without try/catch. On failure, the page falls back to DuckDuckGo
  // (every code path checks `modelReady` before reaching the embedder).
  // ───────────────────────────────────────────────────────────────────────
  async function fetchEmbeddings() {
    const ctl = new AbortController();
    const t = setTimeout(() => ctl.abort(), FETCH_TIMEOUT_MS);
    try {
      const resp = await fetch(EMBEDDINGS_URL, {
        signal: ctl.signal,
        // Cache busting: rely on URL versioning + `_headers`; avoid
        // `cache: 'no-store'` because that defeats the browser cache
        // entirely and forces a 3.5 MB download on every visit.
        cache: 'default',
        credentials: 'omit',
      });
      if (!resp.ok) throw new Error(`embeddings HTTP ${resp.status}`);
      const raw = await resp.json();
      if (!Array.isArray(raw) || raw.length === 0) {
        throw new Error('embeddings empty or malformed');
      }
      return raw;
    } finally {
      clearTimeout(t);
    }
  }

  function setStatus(state, title) {
    statusDot.dataset.state = state;
    statusDot.title = title;
    statusDot.classList.toggle('ready', state === 'ready');
    statusDot.classList.toggle('failed', state === 'failed');
    statusDot.classList.toggle('keyword', state === 'keyword');
  }

  function showError(message) {
    // Build via DOM nodes (no innerHTML — message can include err.message).
    errorBanner.replaceChildren();
    errorBanner.appendChild(document.createTextNode(
      'Model unavailable — keyword routing active. Bangs, direct URLs, ' +
      'and most queries still route correctly. ' +
      '(' + message + ') '
    ));
    const retry = document.createElement('button');
    retry.type = 'button';
    retry.className = 'retry-link';
    retry.id = 'error-retry';
    retry.textContent = 'Retry';
    retry.addEventListener('click', retryModelLoad);
    errorBanner.appendChild(retry);
    errorBanner.classList.add('active');
  }

  function hideError() {
    errorBanner.classList.remove('active');
    errorBanner.replaceChildren();
  }

  /**
   * Best-effort cache nuke. iOS Safari occasionally serves a half-cached
   * model or stale embeddings; "Retry" clears every cache the page
   * controls, then full-reloads. We can't blow away service-worker
   * caches we don't own, but we don't have a SW so this is exhaustive.
   */
  async function clearAppCaches() {
    try {
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (e) { console.warn('caches.keys()/delete failed', e); }
    try {
      if ('indexedDB' in window && indexedDB.databases) {
        const dbs = await indexedDB.databases();
        await Promise.all((dbs || []).map(db => new Promise(r => {
          if (!db.name) return r(undefined);
          const req = indexedDB.deleteDatabase(db.name);
          req.onsuccess = req.onerror = req.onblocked = () => r(undefined);
        })));
      }
    } catch (e) { console.warn('indexedDB.databases()/delete failed', e); }
  }

  async function retryModelLoad() {
    hideError();
    // Clear the crash-loop sentinel and counter so the user explicitly
    // opting in to "Retry" gets a fresh attempt rather than landing in
    // lite-mode again.
    try {
      sessionStorage.removeItem(CRASH_FLAG_KEY);
      sessionStorage.removeItem(CRASH_COUNT_KEY);
    } catch (_) {}
    await clearAppCaches();
    // Hard reload bypasses HTTP cache; the cleared caches/IDB above
    // ensure transformers.js can't re-hydrate from a corrupt local copy.
    location.reload();
  }

  /**
   * Distinguish transient init failures (network blips, partial body,
   * abort due to timeout) from deterministic ones (404, protobuf parse).
   * We only retry the transient class — retrying a protobuf failure just
   * burns the user's data plan to no useful end.
   */
  function isTransientError(err) {
    if (!err) return false;
    const msg = String(err.message || err);
    if (err.name === 'AbortError')                         return true;
    if (/network|fetch|failed to fetch|timeout|timed out/i.test(msg)) return true;
    if (/HTTP 5\d\d|HTTP 408|HTTP 429/i.test(msg))         return true;
    return false;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ───────────────────────────────────────────────────────────────────────
  // Crash-loop detection (iOS Safari "A problem repeatedly occurred")
  //
  // iOS Safari shows a hostile "A problem repeatedly occurred on …" page
  // and effectively blacklists the URL once the WebContent process
  // crashes ~3 times in a row. Loading a 22 MB ONNX model + WASM runtime
  // on a memory-pressured iPhone is the most likely trigger.
  //
  // We defend against this with a session-storage sentinel:
  //   1. Before model load starts, we set `divid3-loading=1`. If the tab
  //      is killed mid-init, the flag survives the reload (sessionStorage
  //      persists across crashes/reloads of the same tab).
  //   2. On the *next* boot, if the flag is still set we know the
  //      previous attempt didn't complete cleanly, and we bump a
  //      crash-count counter.
  //   3. Once the crash count reaches MAX_CRASHES_BEFORE_FALLBACK we
  //      stop trying to load the model entirely and fall back to a
  //      rule-based "DDG plus bangs" mode. The user keeps a working
  //      search engine; iOS stops killing the tab.
  // ───────────────────────────────────────────────────────────────────────
  const CRASH_FLAG_KEY  = 'divid3-loading';
  const CRASH_COUNT_KEY = 'divid3-crash-count';
  const MAX_CRASHES_BEFORE_FALLBACK = 2;

  function readCrashCount() {
    try { return parseInt(sessionStorage.getItem(CRASH_COUNT_KEY) || '0', 10) || 0; }
    catch (_) { return 0; }
  }
  function writeCrashCount(n) {
    try { sessionStorage.setItem(CRASH_COUNT_KEY, String(n)); } catch (_) {}
  }
  function markLoadStart() {
    try { sessionStorage.setItem(CRASH_FLAG_KEY, '1'); } catch (_) {}
  }
  function markLoadEnd() {
    try { sessionStorage.removeItem(CRASH_FLAG_KEY); } catch (_) {}
  }
  /** Returns the crash count detected at boot, after recording any new
   *  unfinished-load. Call exactly once on startup. */
  function detectAndRecordCrash() {
    let wasInProgress = false;
    try { wasInProgress = sessionStorage.getItem(CRASH_FLAG_KEY) === '1'; }
    catch (_) {}
    let count = readCrashCount();
    if (wasInProgress) {
      count += 1;
      writeCrashCount(count);
      // Clear the in-progress flag now that we've counted it.
      markLoadEnd();
      console.warn(`Search router: detected unfinished previous load (crash count: ${count})`);
    }
    return count;
  }
  const crashCount = detectAndRecordCrash();
  const skipModelDueToCrashes = crashCount >= MAX_CRASHES_BEFORE_FALLBACK;

  // ───────────────────────────────────────────────────────────────────────
  // Safer pipeline config for iOS Safari:
  //
  // - WebGPU on Safari is gated/buggy as of 2025. transformers.js v3's
  //   `device: 'auto'` will probe WebGPU first, which on iOS has been
  //   observed to crash the WebContent process. Pinning to 'wasm'
  //   forces the well-trodden ONNX-WASM path everywhere — slightly
  //   slower on a fast desktop, but predictable on Safari.
  // - We could narrow this to a UA sniff, but the WASM path is fast
  //   enough for a 22 MB MiniLM and avoids a whole class of cross-
  //   browser flake. Keep it simple.
  // ───────────────────────────────────────────────────────────────────────
  const PIPELINE_OPTS = { dtype: MODEL_DTYPE, device: 'wasm' };

  /** Run the model + embeddings load once. Throws on any failure.
   *  Loads sequentially (embeddings first, then model) so we don't peak
   *  at ~24 MB of concurrent downloads on a memory-pressured iPhone. */
  async function loadModelOnce() {
    const raw = await fetchEmbeddings();
    const model = await pipeline('feature-extraction', MODEL_ID, PIPELINE_OPTS);
    return { raw, model };
  }

  function initModel() {
    if (modelLoadPromise) return modelLoadPromise;

    // Explicit `?lite=1` opt-in: the user (or a deep link) asked for
    // keyword-only routing. Skip the model entirely.
    if (keywordMode) {
      console.log('Search router: keyword mode (?lite=1) — skipping model load');
      setStatus('keyword', 'Keyword routing (lite mode)');
      loadingOverlay.classList.remove('active');
      document.querySelector('.footer-links').classList.add('visible');
      modelLoadPromise = Promise.resolve(false);
      return modelLoadPromise;
    }

    // If the previous one or two boots crashed mid-load, don't try
    // again — switch to keyword routing instead of attempting another
    // model load. This is the actual mitigation for the iOS "A problem
    // repeatedly occurred" lockout: by the time Safari would have shown
    // it, we've already given the user a usable, smart router.
    if (skipModelDueToCrashes) {
      console.warn(
        `Search router: skipping model load after ${crashCount} unfinished attempts; ` +
        'falling back to keyword routing.'
      );
      keywordMode = true;
      modelFailed = true;
      setStatus('keyword', 'Keyword routing (model disabled after repeated crashes)');
      showError(
        'Keyword routing active after a previous load failed. ' +
        'Bangs, Enter, and most queries still route correctly.'
      );
      loadingOverlay.classList.remove('active');
      document.querySelector('.footer-links').classList.add('visible');
      modelLoadPromise = Promise.resolve(false);
      return modelLoadPromise;
    }

    loadingOverlay.classList.add('active');
    setStatus('loading', 'Embedding Model Loading…');
    markLoadStart();
    const loadPromise = (async () => {
      let lastErr = null;
      for (let attempt = 0; attempt <= MODEL_LOAD_RETRIES; attempt++) {
        try {
          if (attempt > 0) {
            const wait = MODEL_LOAD_RETRY_BASE_MS * Math.pow(2, attempt - 1);
            console.warn(`Search router: retrying model load (attempt ${attempt + 1}) after ${wait}ms`);
            setStatus('loading', `Embedding Model Loading… (retry ${attempt})`);
            await sleep(wait);
          } else {
            console.log('Search router: initializing…');
          }
          const { raw, model } = await loadModelOnce();
          // Convert to typed arrays once. Vectors are L2-normalized at
          // build time, so cosine == dot product (no per-query sqrt).
          routes = raw.map(r => ({
            key: r.key,
            vectors: r.vectors.map(v => Float32Array.from(v)),
          }));
          extractor = model;
          modelReady = true;
          modelEverLoaded = true;
          // We made it — clear the in-progress flag and reset the
          // crash counter so the next visit boots normally even if
          // there were transient failures earlier in the session.
          markLoadEnd();
          writeCrashCount(0);
          setStatus('ready', 'Embedding Model Ready');
          const total = routes.reduce((n, r) => n + r.vectors.length, 0);
          console.log(`Search router: ready (${routes.length} routes, ${total} vectors)`);
          if (!isRedirecting) {
            loadingOverlay.classList.remove('active');
            document.querySelector('.footer-links').classList.add('visible');
            // Only refresh the hint when we're staying on the page. On
            // the `?q=` redirect path, kicking off an inference here
            // would race with the redirect's own classify() call —
            // single-flight would drop the redirect's call and leave
            // the user stuck on "Loading model..." until they back out.
            updateHint();
          }
          return true;
        } catch (err) {
          lastErr = err;
          console.error(`Search router: init attempt ${attempt + 1} failed`, err);
          if (!isTransientError(err)) break;
        }
      }
      // Controlled failure path (we caught the error). Clear the
      // in-progress flag so we don't false-positive a "crash" next boot.
      // Switch to keyword routing — same code path the crash-loop
      // guard uses. The Retry button still works if the user wants
      // to re-attempt the model load (clears caches + reload).
      markLoadEnd();
      modelFailed = true;
      keywordMode = true;
      const msg = (lastErr && lastErr.message) || String(lastErr);
      setStatus('keyword', 'Keyword routing (model load failed: ' + msg + ')');
      showError(msg);
      loadingOverlay.classList.remove('active');
      document.querySelector('.footer-links').classList.add('visible');
      return false;
    })();
    modelLoadPromise = loadPromise;
    // After the load settles, drop the cached promise so a subsequent
    // dispose+reload (visibility-restore, periodic recycle) sees a
    // clear "no init in flight" signal. Without this, modelLoadPromise
    // stays truthy forever and silentReload's "real init is already
    // running" guard locks us out of the silent-reload path.
    loadPromise.finally(() => {
      if (modelLoadPromise === loadPromise) modelLoadPromise = null;
    });
    return loadPromise;
  }

  // ───────────────────────────────────────────────────────────────────────
  // iOS heap-pressure mitigations (no-worker design)
  //
  // The ONNX runtime + 22 MB MiniLM live on the main thread alongside
  // the page. On iOS Safari, the WebContent process has a hard memory
  // ceiling per tab (~280–384 MB depending on the device); when the
  // page approaches it, iOS kills the tab and ~3 such kills produce
  // the user-hostile "A problem repeatedly occurred" interstitial.
  //
  // Two failure modes we defend against here:
  //
  //   - Background reclaim. iOS evicts large backgrounded tabs first.
  //     If we drop the model when the tab is hidden, we're a much less
  //     attractive target and survive longer in the background.
  //
  //   - Heap drift. ONNX-WASM allocates per-call buffers; over a
  //     long typing session the heap creeps upward even though
  //     individual tensors get GC'd. Periodically disposing the
  //     pipeline and reloading from IDB cache resets the high-water
  //     mark to the model's intrinsic footprint.
  //
  // Both paths reload silently (no overlay, no banner) so the only
  // observable effect is a brief routing fallback to DDG while a fresh
  // pipeline finishes initializing. crash-loop sentinels are
  // intentionally untouched — they exist for *cold-boot* WebContent
  // crashes, not for our own deliberate dispose-and-reload cycles.
  // ───────────────────────────────────────────────────────────────────────

  /** Free the extractor and mark not-ready. Does NOT touch the crash
   *  sentinel or modelEverLoaded — this is a recoverable disposal, not
   *  a failure. */
  function disposeExtractor() {
    try { extractor && extractor.dispose && extractor.dispose(); } catch (_) {}
    extractor = null;
    modelReady = false;
  }

  /** Silent reload from IDB cache. Used by the visibility-shown handler
   *  and the periodic recycle. Doesn't fight with cold-boot init. */
  let silentReloadInflight = false;
  async function silentReload() {
    if (silentReloadInflight) return;
    if (!modelEverLoaded || modelReady || modelFailed) return;
    if (modelLoadPromise) return;     // a real init is already running
    silentReloadInflight = true;
    try {
      const fresh = await pipeline('feature-extraction', MODEL_ID, PIPELINE_OPTS);
      extractor = fresh;
      modelReady = true;
      setStatus('ready', 'Embedding Model Ready');
    } catch (e) {
      console.warn('Search router: silent reload failed; will retry on next inference', e);
    } finally {
      silentReloadInflight = false;
    }
  }

  // Periodic pipeline recycle ─ called by classify() after every
  // INFERENCES_PER_RECYCLE inferences. Defers the actual dispose+reload
  // by ~1.5 s so we don't compete with the user's current typing burst.
  let recycleScheduled = false;
  function scheduleRecycle() {
    if (recycleScheduled || !modelEverLoaded) return;
    recycleScheduled = true;
    setTimeout(async () => {
      recycleScheduled = false;
      // Skip if the user typed again very recently, the page is hidden
      // (visibility handler will reload on return), or an inference is
      // mid-flight. Bail-on-conflict is correct here; we'll get another
      // chance the next time the counter rolls over.
      if (!modelReady || inferenceInflight) return;
      if (document.visibilityState === 'hidden') return;
      console.log('Search router: recycling pipeline to reset WASM heap');
      disposeExtractor();
      await silentReload();
    }, 1500);
  }

  // Visibility-aware cleanup ─ release the model when the tab is
  // backgrounded so iOS picks a different tab to reclaim under memory
  // pressure. The 5 s delay is intentional: short tab-switches (copying
  // a link, glancing at another tab) shouldn't pay the reload cost. If
  // iOS suspends our JS before the timer fires (it usually does for
  // tabs hidden longer than a few seconds), we never dispose — but in
  // that frozen state iOS isn't billing us memory the same way either.
  let hiddenDisposeTimer = null;
  const HIDDEN_DISPOSE_DELAY_MS = 5_000;
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      clearTimeout(hiddenDisposeTimer);
      hiddenDisposeTimer = setTimeout(() => {
        if (document.visibilityState === 'hidden' && modelReady && !inferenceInflight) {
          console.log('Search router: tab hidden, disposing extractor to ease iOS memory pressure');
          disposeExtractor();
        }
      }, HIDDEN_DISPOSE_DELAY_MS);
    } else {
      clearTimeout(hiddenDisposeTimer);
      hiddenDisposeTimer = null;
      // Lazy reload if we'd disposed while hidden. classify() will also
      // request this on demand if the user types before we finish — the
      // silentReloadInflight guard makes both paths idempotent.
      silentReload();
    }
  });

  // pagehide is a more reliable teardown signal than unload on iOS
  // (fires for bfcache moves and tab close). Best-effort dispose so the
  // tab's memory footprint drops before iOS reclaims it.
  window.addEventListener('pagehide', () => {
    clearTimeout(hiddenDisposeTimer);
    disposeExtractor();
  });

  // ───────────────────────────────────────────────────────────────────────
  // bfcache restore for `?q=` pages
  //
  // When a user navigates to `divid3.com/?q=foo`, we redirect them to
  // the destination engine via location.replace. The redirect leaves
  // no entry in history — pressing Back from the destination skips
  // divid3 entirely. Good.
  //
  // BUT iOS Safari's bfcache occasionally restores the `?q=foo` page
  // anyway (back-tap from a hung destination, gesture-driven swipes
  // mid-redirect, or a server that prefetched divid3 on hover). The
  // script doesn't re-run on bfcache restore — the user sees whatever
  // visual state the page was in at navigation time, often a stuck
  // "Loading model..." overlay or the routing countdown frozen in
  // place. That's the "current behavior is odd" case.
  //
  // Fix: detect bfcache restore (pageshow.persisted), reset the
  // overlays, drop `?q=` from the URL via history.replaceState, and
  // surface the original query in the input box so the user can
  // edit/re-submit. Effectively turns "stuck on a stale redirect"
  // into "fresh divid3 page with your query pre-filled."
  // ───────────────────────────────────────────────────────────────────────
  window.addEventListener('pageshow', (event) => {
    if (!event.persisted) return;       // fresh load — script just ran, nothing to reset

    // Stop the original `?q=` IIFE from completing its redirect once
    // initPromise eventually resolves (it may still be in flight if
    // the user backed out mid-load).
    pendingRedirectAborted = true;

    // Cancel any pending route timer that might fire after the user
    // already navigated away and back.
    if (routeTimer) { clearTimeout(routeTimer); routeTimer = null; }

    // Hide overlays that may have been mid-animation when we left.
    overlay.style.display = 'none';
    progress.style.width = '0%';
    loadingOverlay.classList.remove('active');

    // If we landed here via a `?q=` URL, restore the user's query into
    // the input and strip the parameter so the page doesn't try to
    // redirect again on the next interaction.
    const url = new URL(location.href);
    const qOnRestore = url.searchParams.get('q');
    if (qOnRestore !== null) {
      const trimmed = qOnRestore.trim();
      if (trimmed) {
        search.value = trimmed;
        // Trigger the hint update so rule-based engines (bangs / direct
        // URLs) preview correctly without waiting for the user to type.
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updateHint, 0);
      }
      url.searchParams.delete('q');
      history.replaceState(null, '', url.toString());
    }

    // Re-show the footer if the model is ready (or re-trigger lazy
    // reload if we had disposed on pagehide).
    if (modelReady) {
      document.querySelector('.footer-links').classList.add('visible');
    } else if (modelEverLoaded) {
      silentReload();
    }

    // Restore focus to the input so the user can immediately type.
    try { search.focus(); } catch (_) {}
  });

  // ───────────────────────────────────────────────────────────────────────
  // Routing
  // ───────────────────────────────────────────────────────────────────────

  /**
   * Dot product. Inputs MUST both be L2-normalized — then this equals
   * cosine similarity. We assert that on the route side at load time
   * (vectors come from a build-time pipeline with normalize=true) and
   * on the query side via `normalize: true` in the extractor call.
   */
  function dot(a, b) {
    const len = a.length;
    let s = 0;
    for (let i = 0; i < len; i++) s += a[i] * b[i];
    return s;
  }

  /**
   * Score a query against every route. Each route's score is the *max*
   * similarity over its example vectors (nearest-neighbor pooling — more
   * robust than averaging when example phrasings vary widely).
   */
  function scoreAll(qVec) {
    const scores = new Array(routes.length);
    for (let i = 0; i < routes.length; i++) {
      const vecs = routes[i].vectors;
      let best = -1;
      for (let j = 0; j < vecs.length; j++) {
        const s = dot(qVec, vecs[j]);
        if (s > best) best = s;
      }
      scores[i] = { key: routes[i].key, score: best };
    }
    scores.sort((a, b) => b.score - a.score);
    return scores;
  }

  function classifyRules(query) {
    if (query.startsWith('!')) {
      const cmd = query.split(' ', 1)[0].slice(1);
      if (BANG_MAP[cmd]) return BANG_MAP[cmd];
    }
    if (!query.includes(' ') && (DOMAIN_RE.test(query) || LOCALHOST_RE.test(query))) {
      return 'direct';
    }
    return null;
  }

  /**
   * Returns { key, scores } where `scores` is sorted desc by similarity
   * (or [] when classification was rule-based / model not ready / call
   * dropped due to in-flight inference).
   * `staleCheck` is an optional () => boolean; if it ever returns true
   * we abort and return null so the caller can drop a stale result.
   * `options.allowInference` (default true) — set false on the typing
   * path to skip the model for ultra-short queries.
   */
  let inferenceInflight = false;
  let inferenceCount = 0;
  async function classify(rawQuery, staleCheck, options = {}) {
    const q = rawQuery.toLowerCase().trim();
    if (!q) return { key: 'ddg', scores: [] };

    const ruleKey = classifyRules(q);
    if (ruleKey) return { key: ruleKey, scores: [] };

    // Keyword-mode short-circuit: when the page is in low-memory /
    // model-unavailable mode, never touch the model. Classification is
    // deterministic keyword matching with a DDG fallback for queries
    // that don't match any rule.
    if (keywordMode) {
      return { key: classifyKeywords(q) || 'ddg', scores: [] };
    }

    if (!modelReady) {
      // Either the model never loaded, or we released it on
      // visibilitychange / periodic recycle. Kick off a background
      // reload so the *next* keystroke can use it; this one routes
      // via keywords (smarter than blanket DDG). Prefer silentReload
      // (no overlay) when we've already had a successful load — that's
      // the recycle / visibility-shown case. Cold-boot still goes
      // through initModel for the loading UX and crash-loop sentinel.
      if (!modelFailed && !modelLoadPromise) {
        if (modelEverLoaded) silentReload();
        else initModel();
      }
      return { key: classifyKeywords(q) || 'ddg', scores: [] };
    }

    // Caller opts in to inference; typing path passes false for very
    // short queries to keep the WASM heap idle. Even on the no-inference
    // path, a keyword match is free routing intelligence.
    if (options.allowInference === false) {
      return { key: classifyKeywords(q) || 'ddg', scores: [] };
    }

    // Single-flight: if a previous inference is still running, drop this
    // call. The next debounced tick (or the user pausing for >220 ms)
    // will trigger another classify with the latest input. Without this,
    // fast typers stack concurrent WASM allocations.
    if (inferenceInflight) return null;
    inferenceInflight = true;
    let output = null;
    try {
      output = await extractor([q], { pooling: 'mean', normalize: true });
      if (staleCheck && staleCheck()) return null;
      // `output.data` is the underlying Float32Array (length 384 for one
      // query). Use it directly — `tolist()` would copy into a boxed
      // JS Array first, wasted work + allocation. dot() is faster on a
      // Float32Array anyway.
      const qVec = output.data;
      const scores = scoreAll(qVec);
      const top = scores[0];
      const key = top.score >= SIMILARITY_THRESHOLD ? top.key : 'ddg';
      return { key, scores };
    } catch (e) {
      console.error('Inference error', e);
      return { key: 'ddg', scores: [] };
    } finally {
      // Free the WASM-backed tensor before returning. v3 Tensor has a
      // dispose() method but we guard with optional chaining in case a
      // future runtime returns a non-disposable view.
      try { output && output.dispose && output.dispose(); } catch (_) {}
      inferenceInflight = false;
      inferenceCount++;
      // Periodically recycle the pipeline to bound long-session heap
      // drift. Scheduled, not awaited — the next keystroke continues
      // routing on the existing extractor until the recycle completes.
      if (inferenceCount >= INFERENCES_PER_RECYCLE) {
        inferenceCount = 0;
        scheduleRecycle();
      }
    }
  }

  // ───────────────────────────────────────────────────────────────────────
  // UI updates (always cancellable; latest input wins)
  // ───────────────────────────────────────────────────────────────────────
  let hintSeq = 0;

  function clearHint() {
    hint.classList.remove('active');
    document.documentElement.style.setProperty('--engine-color', 'transparent');
    delete document.body.dataset.engine;
    scoresPanel.classList.remove('active');
    scoresPanel.replaceChildren();
  }

  function renderScores(result) {
    if (!result.scores.length) {
      scoresPanel.classList.remove('active');
      scoresPanel.replaceChildren();
      return;
    }
    // Build with DOM nodes (avoids innerHTML / XSS surface). Each row
    // is rendered as a real <button> so it's keyboard-focusable and
    // the click-to-override behavior is announced correctly to screen
    // readers — pressing Enter/Space on a chip routes to that engine
    // exactly as a click does.
    const frag = document.createDocumentFragment();
    for (const s of result.scores) {
      const pct = Math.round(s.score * 100);
      const isBest = s.key === result.key;
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'score-row';
      row.dataset.engine = s.key;
      row.setAttribute('aria-label', `Route to ${engines[s.key].name} (${pct}% match)`);
      row.innerHTML =
        `<span class="score-label">${engines[s.key].name}</span>` +
        `<div class="score-bar"><div class="score-fill${isBest ? ' best' : ''}" style="width:${pct}%"></div></div>` +
        `<span class="score-val">${pct}%</span>`;
      frag.appendChild(row);
    }
    scoresPanel.replaceChildren(frag);
    scoresPanel.classList.add('active');
  }

  async function updateHint() {
    const q = search.value.trim();
    const mySeq = ++hintSeq;
    if (!q) { clearHint(); return; }

    // Mobile: rule-based hints only during typing. Bangs, direct URLs,
    // localhost — all the cheap classifications still preview live.
    // Semantic queries show no preview; the destination only appears on
    // the routing overlay after Enter, which runs the model once. This
    // matches the `?q=` redirect path and is the iOS-safe shape.
    //
    // EXCEPTION: in keyword mode, the model isn't running anyway. The
    // keyword classifier is a few regex scans — no WASM, no heap drift,
    // so the rationale for "no live preview" doesn't apply. Showing
    // keyword-based hints on mobile in keyword mode is a free UX win.
    if (mobileMedia.matches) {
      let key = classifyRules(q);
      if (mySeq !== hintSeq) return;
      if (!key && keywordMode) {
        key = classifyKeywords(q);
      }
      if (key) {
        const engine = engines[key];
        hint.textContent = engine.name;
        hint.classList.add('active');
        document.documentElement.style.setProperty('--engine-color', engine.color);
        document.body.dataset.engine = key;
        hint.dataset.routeKey = key;
      } else {
        clearHint();
      }
      // No scores panel render path on mobile. clearHint() above already
      // hides it for non-rule queries; rule hits never showed scores
      // anyway (rules return scores: []).
      return;
    }

    // Desktop: live semantic inference. Typing path skips the model
    // for ultra-short queries; performRoute() does NOT pass this flag,
    // so committing with Enter still runs the model on a 1-char query
    // if that's what the user wants.
    const allowInference = q.length >= MIN_QUERY_LEN_FOR_MODEL;
    const result = await classify(q, () => mySeq !== hintSeq, { allowInference });
    if (!result || mySeq !== hintSeq) return;       // a newer keystroke is in flight

    const engine = engines[result.key];
    hint.textContent = engine.name;
    hint.classList.add('active');
    document.documentElement.style.setProperty('--engine-color', engine.color);
    document.body.dataset.engine = result.key;
    // Store the current route key on the hint so click-to-route knows where to go
    hint.dataset.routeKey = result.key;
    renderScores(result);
  }

  // ───────────────────────────────────────────────────────────────────────
  // Routing / redirect
  // ───────────────────────────────────────────────────────────────────────
  function buildTargetUrl(rawQuery, key) {
    let q = rawQuery.trim();
    if (q.startsWith('!')) {
      const parts = q.split(/\s+/);
      if (parts.length > 1) q = parts.slice(1).join(' ');
    }
    return key === 'direct'
      ? engines.direct.url(q)
      : engines[key].url(encodeURIComponent(q));
  }

  /**
   * @param {string}  rawQuery  the user's text
   * @param {boolean} immediate true → navigate without showing the
   *                            "redirecting…" overlay (used when the
   *                            user explicitly clicks a destination)
   * @param {string?} overrideKey  if provided, route to this engine
   *                            *instead* of asking the model to
   *                            classify. This is how the engine-hint
   *                            click-to-route and the score-chip
   *                            click-to-override paths bypass the
   *                            usual semantic decision.
   */
  async function performRoute(rawQuery, immediate = false, overrideKey = null) {
    if (!rawQuery || !rawQuery.trim()) return;
    // Defensive: if a previous route was already armed (rapid double
    // Enter, or Enter while a redirect is pending), cancel it first so
    // we don't stack timers / redirect twice.
    if (routeTimer) { clearTimeout(routeTimer); routeTimer = null; }

    let key;
    if (overrideKey && engines[overrideKey]) {
      key = overrideKey;
    } else {
      const result = await classify(rawQuery);
      if (!result) {
        // classify() returned null because another inference was
        // in-flight (single-flight guard). On the immediate path —
        // `?q=` redirect, Enter, click-to-route — the user is
        // committing to a route, so silently bailing would strand
        // them on the loading overlay or do nothing on Enter.
        // Fall back to deterministic classification: rules first
        // (bangs, direct URLs), then keyword scoring, then DDG.
        if (!immediate) return;
        const q = rawQuery.toLowerCase().trim();
        key = classifyRules(q) || classifyKeywords(q) || 'ddg';
      } else {
        key = result.key;
      }
    }
    const url = buildTargetUrl(rawQuery, key);

    if (immediate) {
      location.replace(url);
      return;
    }
    display.textContent = engines[key].name;
    overlay.style.display = 'flex';
    search.blur();
    // Reset width to 0 first so the transition has somewhere to go even
    // if the bar was previously filled by a cancelled route.
    progress.style.width = '0%';
    requestAnimationFrame(() => { progress.style.width = '100%'; });
    routeTimer = setTimeout(() => location.replace(url), ROUTE_DELAY_MS);
  }

  // ───────────────────────────────────────────────────────────────────────
  // Theme toggle (with localStorage persistence)
  // ───────────────────────────────────────────────────────────────────────
  const THEME_KEY = 'divid3-theme';
  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.classList.add('light');
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
      document.documentElement.classList.remove('light');
    }
    // Keep the iOS Safari status-bar / Android browser-chrome color in
    // sync with the user's chosen theme. Without this, toggling the
    // theme leaves the toolbar painted in whatever the OS-level
    // `prefers-color-scheme` says — which on iOS can flip mid-session
    // (e.g. when the device crosses an Auto-mode threshold) and looks
    // like the page itself "randomly" changing modes.
    const tc = document.getElementById('theme-color');
    if (tc) tc.setAttribute('content', theme === 'light' ? '#ffffff' : '#000000');
  }
  function getSavedTheme() {
    try {
      const t = localStorage.getItem(THEME_KEY);
      if (t === 'light' || t === 'dark') return t;
    } catch (_) {}
    return null;
  }
  function saveTheme(theme) {
    try { localStorage.setItem(THEME_KEY, theme); } catch (_) {}
  }
  function toggleTheme() {
    const isLight = document.documentElement.classList.contains('light');
    const next = isLight ? 'dark' : 'light';
    applyTheme(next);
    saveTheme(next);
  }
  // Initialise: saved preference wins over system default
  const savedTheme = getSavedTheme();
  if (savedTheme) applyTheme(savedTheme);
  themeToggle.addEventListener('click', toggleTheme);

  // ───────────────────────────────────────────────────────────────────────
  // Keyboard shortcuts overlay
  // ───────────────────────────────────────────────────────────────────────
  function showShortcuts() { shortcutsOverlay.classList.add('active'); }
  function hideShortcuts() { shortcutsOverlay.classList.remove('active'); }
  shortcutsOverlay.addEventListener('click', e => {
    if (e.target === shortcutsOverlay) hideShortcuts();
  });

  // ───────────────────────────────────────────────────────────────────────
  // Smart paste: strip protocol from pasted URLs so "https://github.com"
  // classifies as a direct link instead of a search query.
  // ───────────────────────────────────────────────────────────────────────
  search.addEventListener('paste', e => {
    const text = (e.clipboardData || window.clipboardData)?.getData('text') || '';
    const trimmed = text.trim();
    // If the clipboard contains only a URL with protocol, strip it.
    if (/^https?:\/\//i.test(trimmed) && !trimmed.includes(' ')) {
      const withoutProtocol = trimmed.replace(/^https?:\/\//i, '');
      // Only strip if the result still looks like a domain (so we don't
      // accidentally mangle search queries that happen to start with http).
      if (DOMAIN_RE.test(withoutProtocol) || LOCALHOST_RE.test(withoutProtocol)) {
        e.preventDefault();
        const start = search.selectionStart || 0;
        const end = search.selectionEnd || 0;
        const val = search.value;
        search.value = val.slice(0, start) + withoutProtocol + val.slice(end);
        search.selectionStart = search.selectionEnd = start + withoutProtocol.length;
        // Trigger the same flow as a normal input event
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updateHint, INPUT_DEBOUNCE_MS);
      }
    }
  });

  // ───────────────────────────────────────────────────────────────────────
  // Event wiring
  // ───────────────────────────────────────────────────────────────────────
  let debounceTimer;
  search.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updateHint, INPUT_DEBOUNCE_MS);
  });

  // Enter routes the current query. Other shortcuts are intentionally
  // handled at the document level (below) — registering them here was a
  // long-standing bug: pressing `t`, `?` or `/` while typing in the
  // search input would `preventDefault` the keystroke and (for `t`)
  // silently flip the theme. That's why some users reported the page
  // "randomly turning to light mode when typing a query".
  search.addEventListener('keydown', e => {
    if (e.key === 'Enter' && search.value.trim()) {
      performRoute(search.value);
    }
  });

  /** True when the keyboard event originated inside an editable element. */
  function isTypingTarget(target) {
    if (!target) return false;
    const tag = target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
    if (target.isContentEditable) return true;
    return false;
  }

  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    // Don't hijack characters the user is typing into the input.
    if (isTypingTarget(e.target)) return;

    if (e.key === '?') {
      e.preventDefault();
      showShortcuts();
    } else if (e.key.toLowerCase() === 't') {
      e.preventDefault();
      toggleTheme();
    } else if (e.key === '/') {
      e.preventDefault();
      search.focus();
    }
  });

  function cancelRoute() {
    if (routeTimer) { clearTimeout(routeTimer); routeTimer = null; }
    overlay.style.display = 'none';
    progress.style.width = '0%';
    search.focus();
  }
  cancel.addEventListener('click', cancelRoute);
  // Escape while the redirect overlay is up should cancel it too. Plain
  // keyboard accessibility — useful on desktop, no harm on mobile.
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (overlay.style.display === 'flex') {
        e.preventDefault();
        cancelRoute();
        return;
      }
      if (shortcutsOverlay.classList.contains('active')) {
        e.preventDefault();
        hideShortcuts();
        return;
      }

    }
  });

  // Rotating placeholder (decorative)
  const placeholders = [
    'Type to search...', '2 + 2 * 42', 'pizza near me', '!yt lofi hip hop',
    'explain quantum gravity', 'github.com', 'image of a black hole',
    'latest AI news', '!gh gemini-cli', 'integral of x^2', 'distance to moon'
  ];
  let pIdx = 0;
  setInterval(() => {
    if (!search.value && document.activeElement !== search) {
      pIdx = (pIdx + 1) % placeholders.length;
      search.placeholder = placeholders[pIdx];
    }
  }, 3000);

  // ───────────────────────────────────────────────────────────────────────
  // Click-to-route
  //
  //  - Clicking the engine hint instantly routes to the engine the
  //    model already picked (a one-tap confirmation).
  //  - Clicking ANY score chip overrides the model's pick and routes
  //    to that engine instead. The chips are real <button>s so
  //    keyboard users get Enter/Space for free; a native click event
  //    fires for both pointer and keyboard activations.
  //
  // Both paths use `performRoute(query, immediate=true, overrideKey)`,
  // which skips the "redirecting…" overlay because the user has just
  // told us exactly where to go.
  // ───────────────────────────────────────────────────────────────────────
  hint.addEventListener('click', () => {
    const key = hint.dataset.routeKey;
    if (!key || !search.value.trim()) return;
    performRoute(search.value, true, key);
  });

  // Event delegation: one listener on the panel survives every
  // re-render of its children. `closest('.score-row')` lets the user
  // click anywhere inside the chip (label, bar, percentage).
  scoresPanel.addEventListener('click', e => {
    const row = e.target.closest('.score-row');
    if (!row || !scoresPanel.contains(row)) return;
    const key = row.dataset.engine;
    if (!key || !search.value.trim()) return;
    performRoute(search.value, true, key);
  });

  // ───────────────────────────────────────────────────────────────────────
  // ?q=… auto-redirect entry point
  //
  // Order matters: we kick off `initModel()` immediately so the network
  // fetch starts in parallel with the rest of script init, then await
  // it from the redirect path. No polling — exactly one resolution.
  // ───────────────────────────────────────────────────────────────────────
  const initPromise = initModel();

  if (qParam !== null) {
    const trimmed = qParam.trim();
    if (!trimmed) {
      // Empty query → just show the page; nothing to redirect to.
      loadingOverlay.classList.remove('active');
    } else {
      search.value = trimmed;
      (async () => {
        const ok = await initPromise;
        // Bail if bfcache restore (or any other reset) flagged the
        // pending redirect as cancelled. Without this check, the
        // user could land on a stale `?q=` page via bfcache, the
        // pageshow handler would clear the URL and overlays — and
        // then this awaited redirect would fire moments later and
        // bounce them right back out, undoing the fix.
        if (pendingRedirectAborted) return;
        // Whether the model loaded or we're in keyword mode, route
        // through performRoute. classify() handles the fallbacks
        // internally — bangs/direct URL/keyword/DDG. Previously this
        // path hard-coded DDG on model failure; keyword mode gives
        // us much smarter offline routing for free.
        performRoute(trimmed, true);
      })();
    }
  }
</script>
</body>
</html>
