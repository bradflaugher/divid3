<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --engine-color: transparent;
    --keyboard-inset: 0px;
    /* Single source of truth for the "redirecting…" countdown. JS reads
       this back via getPropertyValue when arming the route timer, so the
       visual fill and the actual setTimeout always agree. */
    --route-delay-ms: 1500ms;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #999;
      --accent: #000000;
      --code-bg: rgba(0,0,0,0.05);
      --rule: rgba(128,128,128,0.3);
    }
  }
  html.light {
    --bg: #ffffff;
    --text: #000000;
    --text-muted: #999;
    --accent: #000000;
    --code-bg: rgba(0,0,0,0.05);
    --rule: rgba(128,128,128,0.3);
  }
  html.dark {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --code-bg: rgba(255,255,255,0.06);
    --rule: rgba(128,128,128,0.25);
  }
  :root {
    --code-bg: rgba(255,255,255,0.06);
    --rule: rgba(128,128,128,0.25);
  }
  html {
    /* Prevent pull-to-refresh and overscroll bounce on mobile */
    overscroll-behavior: none;
    height: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: max(env(safe-area-inset-top), 1.5rem) 1.25rem max(env(safe-area-inset-bottom), 1rem) 1.25rem;
    transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    /* Prevent text selection on UI elements */
    -webkit-user-select: none;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--engine-color);
    opacity: 0.05;
    pointer-events: none;
    transition: background 0.8s ease;
  }
  .container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
    /* Push input to a comfortable position: top-third on mobile, center on desktop */
    margin-top: 15dvh;
  }
  @media (min-width: 768px) {
    .container {
      margin-top: 0;
      align-self: center;
    }
    body {
      justify-content: center;
      padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
    }
  }
  .input-wrap {
    position: relative;
  }
  #search {
    width: 100%;
    padding: 1.25rem 0;
    border: none;
    border-bottom: 1px solid rgba(128,128,128,0.25);
    border-radius: 0;
    background: transparent;
    color: var(--text);
    /* 16px minimum prevents iOS zoom on focus */
    font-size: max(1.25rem, 16px);
    font-weight: 300;
    outline: none;
    letter-spacing: -0.02em;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    /* Allow text selection in input */
    -webkit-user-select: text;
    user-select: text;
  }
  #search::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }
  #search:focus {
    border-bottom-color: var(--text-muted);
  }
  @media (min-width: 768px) {
    #search {
      font-size: clamp(1.75rem, 4vw, 3rem);
      font-weight: 200;
      letter-spacing: -0.05em;
      padding: 1.5rem 0;
    }
  }
  .engine-hint {
    margin-top: 0.75rem;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .engine-hint.active {
    opacity: 1;
    transform: translateY(0);
  }
  .engine-hint:hover {
    color: var(--text);
  }
  .routing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .engine-name {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 100;
    letter-spacing: -0.06em;
    margin-bottom: 2rem;
    word-break: break-word;
  }
  .cancel-btn {
    background: transparent;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    padding: 0.75rem 2.5rem;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 3rem;
    transition: all 0.2s;
    /* Larger tap target for mobile */
    min-height: 44px;
    min-width: 120px;
    touch-action: manipulation;
  }
  .cancel-btn:hover, .cancel-btn:active {
    color: var(--text);
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .progress-bar {
    width: min(240px, 60vw);
    height: 2px;
    background: var(--text-muted);
    position: relative;
    overflow: hidden;
    opacity: 0.25;
    border-radius: 1px;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--text);
    transition: width var(--route-delay-ms) linear;
  }
  /*
   * --keyboard-inset is set from JS via the visualViewport API and reflects
   * the height of the on-screen keyboard (or any other browser UI eating
   * the bottom of the viewport). It's 0px on desktop and on browsers that
   * support `interactive-widget=resizes-content` (which already shrinks
   * the layout viewport for us).
   */
  .status-dot {
    position: fixed;
    bottom: calc(1.25rem + var(--keyboard-inset, 0px));
    right: 1.25rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.3;
    transition: background 0.3s, opacity 0.3s, bottom 0.2s ease;
  }
  .status-dot.ready {
    background: #00ff00;
    opacity: 0.6;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
  }
  /* ── Scores panel ──
   *
   * Mobile: rendered inline beneath the input (inside `.input-wrap`),
   * as a wrapping grid of pill-shaped chips. This keeps it visually
   * attached to the input and away from the footer links + status dot
   * at the bottom of the viewport, which on mobile were colliding with
   * each other once the soft keyboard pushed everything up.
   *
   * Desktop (≥ 768px): repositioned via `position: fixed` to bottom-left
   * as a vertical list — that's the original desktop layout and there
   * is plenty of room for it on a wide viewport.
   */
  .scores-panel {
    margin-top: 1rem;
    font-size: 0.7rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    color: var(--text-muted);
    line-height: 1.4;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.5rem;
    opacity: 0;
    transform: translateY(4px);
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                max-height 0.25s ease;
  }
  .scores-panel.active {
    opacity: 1;
    transform: translateY(0);
    /* Generous cap; with ~10 routes wrapping into rows of chips this
       comfortably fits even on the smallest phone we care about. */
    max-height: 12rem;
  }
  .scores-panel .score-row {
    /* Real <button> reset — drop browser defaults, keep our chip look. */
    display: flex;
    align-items: center;
    gap: 0.35rem;
    flex-shrink: 0;
    background: rgba(128,128,128,0.08);
    padding: 0.25rem 0.55rem;
    border-radius: 999px;
    border: 1px solid transparent;
    color: inherit;
    font: inherit;
    cursor: pointer;
    /* Disable the iOS double-tap zoom delay so the override feels snappy. */
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease, border-color 0.15s ease,
                color 0.15s ease, transform 0.05s ease;
  }
  .scores-panel .score-row:hover {
    background: rgba(128,128,128,0.16);
    color: var(--text);
  }
  .scores-panel .score-row:active {
    transform: scale(0.97);
  }
  .scores-panel .score-row:focus-visible {
    outline: none;
    border-color: var(--text);
    color: var(--text);
  }
  .scores-panel .score-bar {
    width: 32px;
    height: 3px;
    background: rgba(128,128,128,0.15);
    position: relative;
    overflow: hidden;
    border-radius: 1.5px;
  }
  .scores-panel .score-fill {
    height: 100%;
    background: var(--text-muted);
    transition: width 0.3s ease;
    border-radius: 1.5px;
  }
  .scores-panel .score-fill.best {
    background: var(--text);
  }
  .scores-panel .score-label {
    font-size: 0.65rem;
    white-space: nowrap;
  }
  .scores-panel .score-val {
    font-size: 0.65rem;
    min-width: 22px;
    text-align: right;
  }
  @media (min-width: 768px) {
    /* On desktop, lift the scores back out of the document flow into
       a fixed bottom-left vertical list (the original desktop look). */
    .scores-panel {
      position: fixed;
      bottom: calc(2rem + var(--keyboard-inset, 0px));
      left: 2rem;
      margin-top: 0;
      max-height: none;
      overflow: visible;
      flex-direction: column;
      flex-wrap: wrap;
      gap: 0.15rem;
      max-width: calc(100vw - 4rem);
      z-index: 50;
      pointer-events: none;
    }
    .scores-panel.active {
      max-height: none;
    }
    .scores-panel .score-row {
      /* Desktop look: not a chip — just a row of text with a tiny
         bar. Keep it visually quiet but still hoverable / clickable
         so power users can override the routing decision. */
      background: transparent;
      padding: 0.05rem 0.25rem;
      border-radius: 4px;
      gap: 0.5rem;
      pointer-events: auto;
    }
    .scores-panel .score-row:hover {
      background: rgba(128,128,128,0.10);
    }
    .scores-panel .score-bar {
      width: 60px;
    }
    .scores-panel .score-label {
      /* Wide enough for "DuckDuckGo (html)" (17 chars) at 0.7rem mono. */
      width: 130px;
      text-align: right;
      font-size: 0.7rem;
    }
    .scores-panel .score-val {
      width: 35px;
      font-size: 0.7rem;
    }
    .status-dot {
      bottom: calc(2rem + var(--keyboard-inset, 0px));
      right: 2rem;
    }
  }
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    text-align: center;
    padding: 2rem;
  }
  .loading-overlay.active {
    display: flex;
  }
  .loading-text {
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }
  .loading-spinner {
    width: 24px;
    height: 24px;
    border: 1px solid var(--text-muted);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-dot.failed {
    background: #ff3b30;
    opacity: 0.8;
    box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
  }
  /* Purple = keyword-only mode. The model isn't running on this
     device (low memory, repeated cold-load crashes, or explicit
     ?lite=1 opt-in). Routing still works via the deterministic
     keyword classifier — bangs, direct URLs, and ~100 phrase patterns
     across the 9 destination engines. The user-visible signal is
     "this page is healthy, just not running the model right now." */
  .status-dot.keyword {
    background: #b46cff;
    opacity: 0.7;
    box-shadow: 0 0 10px rgba(180, 108, 255, 0.35);
  }
  .error-banner {
    position: fixed;
    top: max(env(safe-area-inset-top), 0.75rem);
    left: 50%;
    transform: translateX(-50%);
    max-width: min(90vw, 480px);
    width: calc(100vw - 2.5rem);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    background: rgba(255, 59, 48, 0.12);
    border: 1px solid rgba(255, 59, 48, 0.4);
    color: #ff3b30;
    font-size: 0.85rem;
    font-weight: 500;
    display: none;
    z-index: 150;
    text-align: center;
    line-height: 1.4;
  }
  .error-banner.active { display: block; }
  .error-banner .retry-link {
    display: inline-block;
    margin-left: 0.4rem;
    color: inherit;
    background: transparent;
    border: none;
    padding: 0;
    font: inherit;
    text-decoration: underline;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .error-banner .retry-link:focus-visible {
    outline: 1px solid currentColor;
    outline-offset: 2px;
  }
  .footer-links {
    position: fixed;
    bottom: calc(1.25rem + var(--keyboard-inset, 0px));
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    z-index: 60;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease, bottom 0.2s ease;
    pointer-events: none;
  }
  .footer-links.visible {
    opacity: 0.4;
    transform: translateY(0);
    pointer-events: auto;
  }
  /* On mobile, the soft keyboard pushes the footer links right up
     against the input. Hide them whenever the keyboard is present —
     the user is in the middle of typing a query, not browsing
     about-pages. The status dot is also hidden to maximize breathing
     room around the input. */
  body[data-keyboard="open"] .footer-links {
    opacity: 0;
    pointer-events: none;
  }
  body[data-keyboard="open"] .status-dot {
    opacity: 0;
    pointer-events: none;
  }
  @media (min-width: 768px) {
    /* On desktop the keyboard concept doesn't apply; always show the
       footer links and status dot regardless of focus state. */
    body[data-keyboard="open"] .footer-links,
    body[data-keyboard="open"] .status-dot {
      opacity: unset;
      pointer-events: unset;
    }
    body[data-keyboard="open"] .footer-links.visible {
      opacity: 0.4;
      pointer-events: auto;
    }
  }
  .footer-links a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.3s ease, opacity 0.3s ease;
    -webkit-user-select: none;
    user-select: none;
  }
  .footer-links a:hover {
    color: var(--text);
    opacity: 0.8;
  }
  @media (min-width: 768px) {
    .footer-links {
      bottom: calc(2rem + var(--keyboard-inset, 0px));
      left: auto;
      right: 5rem;
      justify-content: flex-end;
      font-size: 0.75rem;
      gap: 2rem;
    }
  }
  /* ── Keyboard-shortcuts help overlay ── */
  .shortcuts-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 2rem;
    animation: fadeIn 0.2s ease;
  }
  .shortcuts-overlay.active { display: flex; }
  .shortcuts-panel {
    width: 100%;
    max-width: 420px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .shortcuts-panel h2 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 1rem;
    text-align: center;
  }
  .shortcuts-panel .sc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--rule);
    font-size: 0.85rem;
    font-weight: 300;
  }
  .shortcuts-panel .sc-row:last-child { border-bottom: none; }
  .shortcuts-panel kbd {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.75rem;
    background: var(--code-bg);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 0.15rem 0.4rem;
    min-width: 24px;
    text-align: center;
    display: inline-block;
  }
  .shortcuts-panel .sc-close {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  /* ── Theme toggle ── */
  .theme-toggle {
    position: fixed;
    top: max(env(safe-area-inset-top), 0.75rem);
    right: 0.75rem;
    z-index: 70;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 0.35rem 0.5rem;
    font-size: 0.9rem;
    line-height: 1;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s, border-color 0.2s;
    min-height: 32px;
    min-width: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .theme-toggle:hover, .theme-toggle:focus {
    color: var(--text);
    border-color: var(--text);
    outline: none;
  }
  @media (min-width: 768px) {
    .theme-toggle {
      top: max(env(safe-area-inset-top), 1rem);
      right: 1.25rem;
    }
  }
</style>

<div class="container">
  <div class="input-wrap">
    <input autocomplete="off" autocorrect="off" autocapitalize="off"
           spellcheck="false" enterkeyhint="search"
           aria-label="Search query"
           id="search" placeholder="Type to search..." type="text" autofocus/>
    <div class="engine-hint" id="hint">DuckDuckGo</div>

         keyboard, the footer links, and the status dot). On desktop CSS
         repositions them to fixed bottom-left. -->
    <div class="scores-panel" id="scores"></div>
  </div>
</div>
