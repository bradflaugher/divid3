<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --engine-color: transparent;
    --keyboard-inset: 0px;
    /* Single source of truth for the "redirecting…" countdown. JS reads
       this back via getPropertyValue when arming the route timer, so the
       visual fill and the actual setTimeout always agree. */
    --route-delay-ms: 1500ms;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #999;
      --accent: #000000;
      --code-bg: rgba(0,0,0,0.05);
      --rule: rgba(128,128,128,0.3);
    }
  }
  html.light {
    --bg: #ffffff;
    --text: #000000;
    --text-muted: #999;
    --accent: #000000;
    --code-bg: rgba(0,0,0,0.05);
    --rule: rgba(128,128,128,0.3);
  }
  html.dark {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --code-bg: rgba(255,255,255,0.06);
    --rule: rgba(128,128,128,0.25);
  }
  :root {
    --code-bg: rgba(255,255,255,0.06);
    --rule: rgba(128,128,128,0.25);
  }
  html {
    /* Prevent pull-to-refresh and overscroll bounce on mobile */
    overscroll-behavior: none;
    height: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: max(env(safe-area-inset-top), 1.5rem) 1.25rem max(env(safe-area-inset-bottom), 1rem) 1.25rem;
    transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    /* Prevent text selection on UI elements */
    -webkit-user-select: none;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--engine-color);
    opacity: 0.05;
    pointer-events: none;
    transition: background 0.8s ease;
  }
  .container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
    /* Push input to a comfortable position: top-third on mobile, center on desktop */
    margin-top: 15dvh;
  }
  @media (min-width: 768px) {
    .container {
      margin-top: 0;
      align-self: center;
    }
    body {
      justify-content: center;
      padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
    }
  }
  .input-wrap {
    position: relative;
  }
  #search {
    width: 100%;
    padding: 1.25rem 0;
    border: none;
    border-bottom: 1px solid rgba(128,128,128,0.25);
    border-radius: 0;
    background: transparent;
    color: var(--text);
    /* 16px minimum prevents iOS zoom on focus */
    font-size: max(1.25rem, 16px);
    font-weight: 300;
    outline: none;
    letter-spacing: -0.02em;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    /* Allow text selection in input */
    -webkit-user-select: text;
    user-select: text;
  }
  #search::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }
  #search:focus {
    border-bottom-color: var(--text-muted);
  }
  @media (min-width: 768px) {
    #search {
      font-size: clamp(1.75rem, 4vw, 3rem);
      font-weight: 200;
      letter-spacing: -0.05em;
      padding: 1.5rem 0;
    }
  }
  .engine-hint {
    margin-top: 0.75rem;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .engine-hint.active {
    opacity: 1;
    transform: translateY(0);
  }
  .engine-hint:hover {
    color: var(--text);
  }
  .routing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .engine-name {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 100;
    letter-spacing: -0.06em;
    margin-bottom: 2rem;
    word-break: break-word;
  }
  .cancel-btn {
    background: transparent;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    padding: 0.75rem 2.5rem;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 3rem;
    transition: all 0.2s;
    /* Larger tap target for mobile */
    min-height: 44px;
    min-width: 120px;
    touch-action: manipulation;
  }
  .cancel-btn:hover, .cancel-btn:active {
    color: var(--text);
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .progress-bar {
    width: min(240px, 60vw);
    height: 2px;
    background: var(--text-muted);
    position: relative;
    overflow: hidden;
    opacity: 0.25;
    border-radius: 1px;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--text);
    transition: width var(--route-delay-ms) linear;
  }
  /*
   * --keyboard-inset is set from JS via the visualViewport API and reflects
   * the height of the on-screen keyboard (or any other browser UI eating
   * the bottom of the viewport). It's 0px on desktop and on browsers that
   * support `interactive-widget=resizes-content` (which already shrinks
   * the layout viewport for us).
   */
  .status-dot {
    position: fixed;
    bottom: calc(1.25rem + var(--keyboard-inset, 0px));
    right: 1.25rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.3;
    transition: background 0.3s, opacity 0.3s, bottom 0.2s ease;
  }
  .status-dot.ready {
    background: #00ff00;
    opacity: 0.6;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
  }
  /* ── Scores panel ──
   *
   * Mobile: rendered inline beneath the input (inside `.input-wrap`),
   * as a wrapping grid of pill-shaped chips. This keeps it visually
   * attached to the input and away from the footer links + status dot
   * at the bottom of the viewport, which on mobile were colliding with
   * each other once the soft keyboard pushed everything up.
   *
   * Desktop (≥ 768px): repositioned via `position: fixed` to bottom-left
   * as a vertical list — that's the original desktop layout and there
   * is plenty of room for it on a wide viewport.
   */
  .scores-panel {
    margin-top: 1rem;
    font-size: 0.7rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    color: var(--text-muted);
    line-height: 1.4;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.5rem;
    opacity: 0;
    transform: translateY(4px);
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                max-height 0.25s ease;
  }
  .scores-panel.active {
    opacity: 1;
    transform: translateY(0);
    /* Generous cap; with ~10 routes wrapping into rows of chips this
       comfortably fits even on the smallest phone we care about. */
    max-height: 12rem;
  }
  .scores-panel .score-row {
    /* Real <button> reset — drop browser defaults, keep our chip look. */
    display: flex;
    align-items: center;
    gap: 0.35rem;
    flex-shrink: 0;
    background: rgba(128,128,128,0.08);
    padding: 0.25rem 0.55rem;
    border-radius: 999px;
    border: 1px solid transparent;
    color: inherit;
    font: inherit;
    cursor: pointer;
    /* Disable the iOS double-tap zoom delay so the override feels snappy. */
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease, border-color 0.15s ease,
                color 0.15s ease, transform 0.05s ease;
  }
  .scores-panel .score-row:hover {
    background: rgba(128,128,128,0.16);
    color: var(--text);
  }
  .scores-panel .score-row:active {
    transform: scale(0.97);
  }
  .scores-panel .score-row:focus-visible {
    outline: none;
    border-color: var(--text);
    color: var(--text);
  }
  .scores-panel .score-bar {
    width: 32px;
    height: 3px;
    background: rgba(128,128,128,0.15);
    position: relative;
    overflow: hidden;
    border-radius: 1.5px;
  }
  .scores-panel .score-fill {
    height: 100%;
    background: var(--text-muted);
    transition: width 0.3s ease;
    border-radius: 1.5px;
  }
  .scores-panel .score-fill.best {
    background: var(--text);
  }
  .scores-panel .score-label {
    font-size: 0.65rem;
    white-space: nowrap;
  }
  .scores-panel .score-val {
    font-size: 0.65rem;
    min-width: 22px;
    text-align: right;
  }
  @media (min-width: 768px) {
    /* On desktop, lift the scores back out of the document flow into
       a fixed bottom-left vertical list (the original desktop look). */
    .scores-panel {
      position: fixed;
      bottom: calc(2rem + var(--keyboard-inset, 0px));
      left: 2rem;
      margin-top: 0;
      max-height: none;
      overflow: visible;
      flex-direction: column;
      flex-wrap: wrap;
      gap: 0.15rem;
      max-width: calc(100vw - 4rem);
      z-index: 50;
      pointer-events: none;
    }
    .scores-panel.active {
      max-height: none;
    }
    .scores-panel .score-row {
      /* Desktop look: not a chip — just a row of text with a tiny
         bar. Keep it visually quiet but still hoverable / clickable
         so power users can override the routing decision. */
      background: transparent;
      padding: 0.05rem 0.25rem;
      border-radius: 4px;
      gap: 0.5rem;
      pointer-events: auto;
    }
    .scores-panel .score-row:hover {
      background: rgba(128,128,128,0.10);
    }
    .scores-panel .score-bar {
      width: 60px;
    }
    .scores-panel .score-label {
      /* Wide enough for "Wolfram Alpha" (13 chars) at 0.7rem mono. */
      width: 95px;
      text-align: right;
      font-size: 0.7rem;
    }
    .scores-panel .score-val {
      width: 35px;
      font-size: 0.7rem;
    }
    .status-dot {
      bottom: calc(2rem + var(--keyboard-inset, 0px));
      right: 2rem;
    }
  }
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    text-align: center;
    padding: 2rem;
  }
  .loading-overlay.active {
    display: flex;
  }
  .loading-text {
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }
  .loading-spinner {
    width: 24px;
    height: 24px;
    border: 1px solid var(--text-muted);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-dot.failed {
    background: #ff3b30;
    opacity: 0.8;
    box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
  }
  .error-banner {
    position: fixed;
    top: max(env(safe-area-inset-top), 0.75rem);
    left: 50%;
    transform: translateX(-50%);
    max-width: min(90vw, 480px);
    width: calc(100vw - 2.5rem);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    background: rgba(255, 59, 48, 0.12);
    border: 1px solid rgba(255, 59, 48, 0.4);
    color: #ff3b30;
    font-size: 0.85rem;
    font-weight: 500;
    display: none;
    z-index: 150;
    text-align: center;
    line-height: 1.4;
  }
  .error-banner.active { display: block; }
  .error-banner .retry-link {
    display: inline-block;
    margin-left: 0.4rem;
    color: inherit;
    background: transparent;
    border: none;
    padding: 0;
    font: inherit;
    text-decoration: underline;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .error-banner .retry-link:focus-visible {
    outline: 1px solid currentColor;
    outline-offset: 2px;
  }
  .footer-links {
    position: fixed;
    bottom: calc(1.25rem + var(--keyboard-inset, 0px));
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    z-index: 60;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease, bottom 0.2s ease;
    pointer-events: none;
  }
  .footer-links.visible {
    opacity: 0.4;
    transform: translateY(0);
    pointer-events: auto;
  }
  /* On mobile, the soft keyboard pushes the footer links right up
     against the input. Hide them whenever the keyboard is present —
     the user is in the middle of typing a query, not browsing
     about-pages. The status dot is also hidden to maximize breathing
     room around the input. */
  body[data-keyboard="open"] .footer-links {
    opacity: 0;
    pointer-events: none;
  }
  body[data-keyboard="open"] .status-dot {
    opacity: 0;
    pointer-events: none;
  }
  @media (min-width: 768px) {
    /* On desktop the keyboard concept doesn't apply; always show the
       footer links and status dot regardless of focus state. */
    body[data-keyboard="open"] .footer-links,
    body[data-keyboard="open"] .status-dot {
      opacity: unset;
      pointer-events: unset;
    }
    body[data-keyboard="open"] .footer-links.visible {
      opacity: 0.4;
      pointer-events: auto;
    }
  }
  .footer-links a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.3s ease, opacity 0.3s ease;
    -webkit-user-select: none;
    user-select: none;
  }
  .footer-links a:hover {
    color: var(--text);
    opacity: 0.8;
  }
  @media (min-width: 768px) {
    .footer-links {
      bottom: calc(2rem + var(--keyboard-inset, 0px));
      font-size: 0.75rem;
      gap: 2rem;
    }
  }
  /* ── Keyboard-shortcuts help overlay ── */
  .shortcuts-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 2rem;
    animation: fadeIn 0.2s ease;
  }
  .shortcuts-overlay.active { display: flex; }
  .shortcuts-panel {
    width: 100%;
    max-width: 420px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .shortcuts-panel h2 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 1rem;
    text-align: center;
  }
  .shortcuts-panel .sc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--rule);
    font-size: 0.85rem;
    font-weight: 300;
  }
  .shortcuts-panel .sc-row:last-child { border-bottom: none; }
  .shortcuts-panel kbd {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.75rem;
    background: var(--code-bg);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 0.15rem 0.4rem;
    min-width: 24px;
    text-align: center;
    display: inline-block;
  }
  .shortcuts-panel .sc-close {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  /* ── Theme toggle ── */
  .theme-toggle {
    position: fixed;
    top: max(env(safe-area-inset-top), 0.75rem);
    right: 0.75rem;
    z-index: 70;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 0.35rem 0.5rem;
    font-size: 0.9rem;
    line-height: 1;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s, border-color 0.2s;
    min-height: 32px;
    min-width: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .theme-toggle:hover, .theme-toggle:focus {
    color: var(--text);
    border-color: var(--text);
    outline: none;
  }
  @media (min-width: 768px) {
    .theme-toggle {
      top: max(env(safe-area-inset-top), 1rem);
      right: 1.25rem;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="input-wrap">
    <input autocomplete="off" autocorrect="off" autocapitalize="off"
           spellcheck="false" enterkeyhint="search"
           aria-label="Search query"
           id="search" placeholder="Type to search..." type="text" autofocus/>
    <div class="engine-hint" id="hint">DuckDuckGo</div>
    <!-- Scores live inside the input-wrap so they sit *under the input*
         on mobile (where the bottom of the screen is occupied by the
         keyboard, the footer links, and the status dot). On desktop CSS
         repositions them to fixed bottom-left. -->
    <div class="scores-panel" id="scores"></div>
  </div>
</div>

<div class="routing-overlay" id="overlay">
  <div class="engine-name" id="engine-display">DuckDuckGo</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <button class="cancel-btn" id="cancel">Cancel</button>
</div>

<div class="status-dot" id="status" data-state="loading" title="Embedding Model Loading..."></div>

<div class="error-banner" id="error-banner" role="alert"></div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading model...</div>
</div>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme (T)">◐</button>

<div class="footer-links">
  <a href="/setup.html">Set as default</a>
  <a href="/privacy.html">Privacy</a>
  <a href="https://github.com/bradflaugher/divid3" target="_blank" rel="noopener">Source</a>
</div>

<div class="shortcuts-overlay" id="shortcuts-overlay">
  <div class="shortcuts-panel">
    <h2>Keyboard Shortcuts</h2>
    <div class="sc-row"><span>Focus search</span><kbd>/</kbd></div>
    <div class="sc-row"><span>Cancel redirect</span><kbd>Esc</kbd></div>
    <div class="sc-row"><span>Toggle theme</span><kbd>T</kbd></div>
    <div class="sc-row"><span>This help</span><kbd>?</kbd></div>
    <div class="sc-close">Press <kbd>?</kbd> or <kbd>Esc</kbd> to close</div>
  </div>
</div>

<script type="module">
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.4';

  // ───────────────────────────────────────────────────────────────────────
  // Config
  //
  // We ship a single quantized ONNX file (model_quantized.onnx, ~22 MB).
  // dtype: 'q8' tells transformers.js v3 to load that exact filename.
  // Using any other dtype (e.g. 'fp32' → model.onnx) would 404; on
  // Cloudflare Pages a 404 is served as HTML, which the ONNX runtime
  // then tries to parse as protobuf and fails with the cryptic
  // "Failed to load model because protobuf parsing failed" error.
  // ───────────────────────────────────────────────────────────────────────
  env.allowLocalModels = true;
  env.allowRemoteModels = false;
  env.localModelPath = '/models/';
  env.useBrowserCache = true;

  // ───────────────────────────────────────────────────────────────────────
  // ONNX runtime tuning — iOS-safe defaults.
  //
  // iOS Safari does not give pages cross-origin isolation (no SAB), so
  // any attempt to spawn ONNX worker threads either no-ops or blows up
  // mid-init. Pinning numThreads = 1 keeps the runtime on the main
  // WASM execution path everywhere — slightly slower on desktop, but
  // dramatically more reliable on iOS. simd is still enabled (works
  // fine in Safari 16+); proxy=false keeps everything on the main
  // thread so transformers.js doesn't try to message a worker that
  // can't be created.
  // ───────────────────────────────────────────────────────────────────────
  try {
    if (env.backends && env.backends.onnx && env.backends.onnx.wasm) {
      env.backends.onnx.wasm.numThreads = 1;
      env.backends.onnx.wasm.proxy = false;
      // simd defaults to true; we don't override it.
    }
  } catch (e) { console.warn('Failed to tune ONNX backend', e); }

  const MODEL_ID = 'sentence-transformers/all-MiniLM-L6-v2';
  const MODEL_DTYPE = 'q8';
  // Versioned URL: bump when search-embeddings.json content changes so
  // any client (especially iOS Safari) can't serve a stale cached body
  // alongside a freshly-fetched index.html. The number must match the
  // committed file's content; see _headers for the fallback short TTL.
  // v2: regenerated from scripts/search_phrases.json with curated examples
  //     and 6-digit float precision (file size 3.7 MB → 1.75 MB).
  const EMBEDDINGS_VERSION = '2';
  const EMBEDDINGS_URL = `/search-embeddings.json?v=${EMBEDDINGS_VERSION}`;
  const SIMILARITY_THRESHOLD = 0.30;   // below this, fall back to DuckDuckGo
  const INPUT_DEBOUNCE_MS = 150;
  const FETCH_TIMEOUT_MS = 30_000;     // give up on stalled embeddings fetch
  const MODEL_LOAD_RETRIES = 2;        // transient init failures only
  const MODEL_LOAD_RETRY_BASE_MS = 800;
  // Read the route-delay countdown from CSS so the visual progress bar
  // and the redirect setTimeout can never drift out of sync.
  const ROUTE_DELAY_MS = (() => {
    const v = getComputedStyle(document.documentElement)
      .getPropertyValue('--route-delay-ms').trim();
    const n = parseFloat(v);
    if (!Number.isFinite(n) || n <= 0) return 1500;
    return v.endsWith('ms') ? n : n * 1000;       // s → ms
  })();

  const engines = {
    'ddg':         { name: 'DuckDuckGo',    color: '#DE5833', url: q => `https://html.duckduckgo.com/html/?q=${q}` },
    'bing-images': { name: 'Bing Images',   color: '#008373', url: q => `https://www.bing.com/images/search?q=${q}` },
    'perplexity':  { name: 'Perplexity',    color: '#20B2AA', url: q => `https://www.perplexity.ai/search?q=${q}` },
    'grok':        { name: 'Grok',          color: '#ffffff', url: q => `https://grok.com/?q=${q}` },
    'maps':        { name: 'Google Maps',   color: '#4285F4', url: q => `https://maps.google.com/maps?q=${q}` },
    'youtube':     { name: 'YouTube',       color: '#FF0000', url: q => `https://www.youtube.com/results?search_query=${q}` },
    'amazon':      { name: 'Amazon',        color: '#FF9900', url: q => `https://www.amazon.com/s?k=${q}` },
    'github':      { name: 'GitHub',        color: '#333',    url: q => `https://github.com/search?q=${q}` },
    'wolfram':     { name: 'Wolfram Alpha', color: '#DA0E1A', url: q => `https://www.wolframalpha.com/input/?i=${q}` },
    'direct':      { name: 'Direct Link',   color: '#00ff00', url: q => q.startsWith('http') ? q : `https://${q}` }
  };

  // Bang shortcuts (always win over semantic routing)
  const BANG_MAP = {
    yt: 'youtube',     y: 'youtube',
    a: 'amazon',       amz: 'amazon',
    m: 'maps',         map: 'maps',
    i: 'bing-images',  img: 'bing-images',
    p: 'perplexity',   px: 'perplexity',
    g: 'grok',         gr: 'grok',
    gh: 'github',      git: 'github',
    w: 'wolfram',      wa: 'wolfram',
    d: 'ddg',          ddg: 'ddg'
  };

  const DOMAIN_RE    = /^[a-z0-9]+([\-\.][a-z0-9]+)*\.[a-z]{2,10}(:[0-9]{1,5})?(\/.*)?$/i;
  const LOCALHOST_RE = /^localhost(:[0-9]{1,5})?(\/.*)?$/i;

  // ───────────────────────────────────────────────────────────────────────
  // DOM
  // ───────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const search         = $('search');
  const hint           = $('hint');
  const overlay        = $('overlay');
  const display        = $('engine-display');
  const progress       = $('progress');
  const cancel         = $('cancel');
  const statusDot      = $('status');
  const loadingOverlay = $('loading');
  const scoresPanel    = $('scores');
  const errorBanner    = $('error-banner');
  const shortcutsOverlay = $('shortcuts-overlay');
  const themeToggle    = $('theme-toggle');

  // ───────────────────────────────────────────────────────────────────────
  // Global error handlers
  //
  // We never want a stray unhandled rejection or an uncaught error inside
  // a transformers.js worker to take down the page silently. These are
  // last-ditch logs (no network — privacy-by-design) plus a status-dot
  // tooltip update so power users notice. The router itself already
  // degrades to DDG on inference failure, so we don't need to mutate the
  // model state from here.
  // ───────────────────────────────────────────────────────────────────────
  window.addEventListener('error', e => {
    // Filter out non-page errors (broken external <img>/<script>).
    if (e && e.target && e.target !== window) return;
    console.error('Search router: uncaught error', e.error || e.message);
  });
  window.addEventListener('unhandledrejection', e => {
    console.error('Search router: unhandled rejection', e.reason);
  });

  // ───────────────────────────────────────────────────────────────────────
  // Mobile keyboard awareness
  //
  // On iOS Safari (and older Chromes that don't honor
  // `interactive-widget=resizes-content`), the soft keyboard does NOT
  // shrink the layout viewport — `position: fixed` elements stay anchored
  // to the layout viewport and end up hidden behind the keyboard.
  //
  // We use the visualViewport API to compute the obscured bottom inset
  // and expose it as a CSS variable, which `.scores-panel` and
  // `.status-dot` add to their `bottom` offset.
  // ───────────────────────────────────────────────────────────────────────
  const vv = window.visualViewport;
  /* Mark the body as `data-keyboard="open"` whenever something (the
     soft keyboard, the iOS find-bar, etc.) is eating non-trivial space
     at the bottom of the viewport. CSS uses this to hide the footer
     links on mobile so they don't crash into the inline scores chips. */
  function setKeyboardOpen(isOpen) {
    if (isOpen) {
      document.body.dataset.keyboard = 'open';
    } else {
      delete document.body.dataset.keyboard;
    }
  }
  if (vv) {
    const KEYBOARD_INSET_THRESHOLD_PX = 120;
    const updateKeyboardInset = () => {
      const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty('--keyboard-inset', inset + 'px');
      setKeyboardOpen(inset > KEYBOARD_INSET_THRESHOLD_PX);
    };
    vv.addEventListener('resize', updateKeyboardInset);
    vv.addEventListener('scroll', updateKeyboardInset);
    updateKeyboardInset();
  }

  // ───────────────────────────────────────────────────────────────────────
  // State
  // ───────────────────────────────────────────────────────────────────────
  let extractor = null;
  let routes = [];                                       // [{ key, vectors: Float32Array[] }]
  let modelReady = false;
  let modelFailed = false;
  let routeTimer = null;
  /** @type {Promise<boolean>}  Resolves true on success, false on failure;
   *  never rejects. ?q= redirect awaits this instead of polling. */
  let modelLoadPromise = null;
  const qParam = new URLSearchParams(location.search).get('q');
  const isRedirecting = qParam !== null;

  // ───────────────────────────────────────────────────────────────────────
  // Model + embeddings loader
  //
  // Returns a never-rejecting Promise<boolean> so callers can `await` it
  // without try/catch. On failure, the page falls back to DuckDuckGo
  // (every code path checks `modelReady` before reaching the embedder).
  // ───────────────────────────────────────────────────────────────────────
  async function fetchEmbeddings() {
    const ctl = new AbortController();
    const t = setTimeout(() => ctl.abort(), FETCH_TIMEOUT_MS);
    try {
      const resp = await fetch(EMBEDDINGS_URL, {
        signal: ctl.signal,
        // Cache busting: rely on URL versioning + `_headers`; avoid
        // `cache: 'no-store'` because that defeats the browser cache
        // entirely and forces a 3.5 MB download on every visit.
        cache: 'default',
        credentials: 'omit',
      });
      if (!resp.ok) throw new Error(`embeddings HTTP ${resp.status}`);
      const raw = await resp.json();
      if (!Array.isArray(raw) || raw.length === 0) {
        throw new Error('embeddings empty or malformed');
      }
      return raw;
    } finally {
      clearTimeout(t);
    }
  }

  function setStatus(state, title) {
    statusDot.dataset.state = state;
    statusDot.title = title;
    statusDot.classList.toggle('ready', state === 'ready');
    statusDot.classList.toggle('failed', state === 'failed');
  }

  function showError(message) {
    // Build via DOM nodes (no innerHTML — message can include err.message).
    errorBanner.replaceChildren();
    errorBanner.appendChild(document.createTextNode(
      'Semantic routing unavailable — Enter still works (DuckDuckGo). ' +
      '(' + message + ') '
    ));
    const retry = document.createElement('button');
    retry.type = 'button';
    retry.className = 'retry-link';
    retry.id = 'error-retry';
    retry.textContent = 'Retry';
    retry.addEventListener('click', retryModelLoad);
    errorBanner.appendChild(retry);
    errorBanner.classList.add('active');
  }

  function hideError() {
    errorBanner.classList.remove('active');
    errorBanner.replaceChildren();
  }

  /**
   * Best-effort cache nuke. iOS Safari occasionally serves a half-cached
   * model or stale embeddings; "Retry" clears every cache the page
   * controls, then full-reloads. We can't blow away service-worker
   * caches we don't own, but we don't have a SW so this is exhaustive.
   */
  async function clearAppCaches() {
    try {
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (e) { console.warn('caches.keys()/delete failed', e); }
    try {
      if ('indexedDB' in window && indexedDB.databases) {
        const dbs = await indexedDB.databases();
        await Promise.all((dbs || []).map(db => new Promise(r => {
          if (!db.name) return r(undefined);
          const req = indexedDB.deleteDatabase(db.name);
          req.onsuccess = req.onerror = req.onblocked = () => r(undefined);
        })));
      }
    } catch (e) { console.warn('indexedDB.databases()/delete failed', e); }
  }

  async function retryModelLoad() {
    hideError();
    // Clear the crash-loop sentinel and counter so the user explicitly
    // opting in to "Retry" gets a fresh attempt rather than landing in
    // lite-mode again.
    try {
      sessionStorage.removeItem(CRASH_FLAG_KEY);
      sessionStorage.removeItem(CRASH_COUNT_KEY);
    } catch (_) {}
    await clearAppCaches();
    // Hard reload bypasses HTTP cache; the cleared caches/IDB above
    // ensure transformers.js can't re-hydrate from a corrupt local copy.
    location.reload();
  }

  /**
   * Distinguish transient init failures (network blips, partial body,
   * abort due to timeout) from deterministic ones (404, protobuf parse).
   * We only retry the transient class — retrying a protobuf failure just
   * burns the user's data plan to no useful end.
   */
  function isTransientError(err) {
    if (!err) return false;
    const msg = String(err.message || err);
    if (err.name === 'AbortError')                         return true;
    if (/network|fetch|failed to fetch|timeout|timed out/i.test(msg)) return true;
    if (/HTTP 5\d\d|HTTP 408|HTTP 429/i.test(msg))         return true;
    return false;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ───────────────────────────────────────────────────────────────────────
  // Crash-loop detection (iOS Safari "A problem repeatedly occurred")
  //
  // iOS Safari shows a hostile "A problem repeatedly occurred on …" page
  // and effectively blacklists the URL once the WebContent process
  // crashes ~3 times in a row. Loading a 22 MB ONNX model + WASM runtime
  // on a memory-pressured iPhone is the most likely trigger.
  //
  // We defend against this with a session-storage sentinel:
  //   1. Before model load starts, we set `divid3-loading=1`. If the tab
  //      is killed mid-init, the flag survives the reload (sessionStorage
  //      persists across crashes/reloads of the same tab).
  //   2. On the *next* boot, if the flag is still set we know the
  //      previous attempt didn't complete cleanly, and we bump a
  //      crash-count counter.
  //   3. Once the crash count reaches MAX_CRASHES_BEFORE_FALLBACK we
  //      stop trying to load the model entirely and fall back to a
  //      rule-based "DDG plus bangs" mode. The user keeps a working
  //      search engine; iOS stops killing the tab.
  // ───────────────────────────────────────────────────────────────────────
  const CRASH_FLAG_KEY  = 'divid3-loading';
  const CRASH_COUNT_KEY = 'divid3-crash-count';
  const MAX_CRASHES_BEFORE_FALLBACK = 2;

  function readCrashCount() {
    try { return parseInt(sessionStorage.getItem(CRASH_COUNT_KEY) || '0', 10) || 0; }
    catch (_) { return 0; }
  }
  function writeCrashCount(n) {
    try { sessionStorage.setItem(CRASH_COUNT_KEY, String(n)); } catch (_) {}
  }
  function markLoadStart() {
    try { sessionStorage.setItem(CRASH_FLAG_KEY, '1'); } catch (_) {}
  }
  function markLoadEnd() {
    try { sessionStorage.removeItem(CRASH_FLAG_KEY); } catch (_) {}
  }
  /** Returns the crash count detected at boot, after recording any new
   *  unfinished-load. Call exactly once on startup. */
  function detectAndRecordCrash() {
    let wasInProgress = false;
    try { wasInProgress = sessionStorage.getItem(CRASH_FLAG_KEY) === '1'; }
    catch (_) {}
    let count = readCrashCount();
    if (wasInProgress) {
      count += 1;
      writeCrashCount(count);
      // Clear the in-progress flag now that we've counted it.
      markLoadEnd();
      console.warn(`Search router: detected unfinished previous load (crash count: ${count})`);
    }
    return count;
  }
  const crashCount = detectAndRecordCrash();
  const skipModelDueToCrashes = crashCount >= MAX_CRASHES_BEFORE_FALLBACK;

  // ───────────────────────────────────────────────────────────────────────
  // Safer pipeline config for iOS Safari:
  //
  // - WebGPU on Safari is gated/buggy as of 2025. transformers.js v3's
  //   `device: 'auto'` will probe WebGPU first, which on iOS has been
  //   observed to crash the WebContent process. Pinning to 'wasm'
  //   forces the well-trodden ONNX-WASM path everywhere — slightly
  //   slower on a fast desktop, but predictable on Safari.
  // - We could narrow this to a UA sniff, but the WASM path is fast
  //   enough for a 22 MB MiniLM and avoids a whole class of cross-
  //   browser flake. Keep it simple.
  // ───────────────────────────────────────────────────────────────────────
  const PIPELINE_OPTS = { dtype: MODEL_DTYPE, device: 'wasm' };

  /** Run the model + embeddings load once. Throws on any failure.
   *  Loads sequentially (embeddings first, then model) so we don't peak
   *  at ~24 MB of concurrent downloads on a memory-pressured iPhone. */
  async function loadModelOnce() {
    const raw = await fetchEmbeddings();
    const model = await pipeline('feature-extraction', MODEL_ID, PIPELINE_OPTS);
    return { raw, model };
  }

  function initModel() {
    if (modelLoadPromise) return modelLoadPromise;

    // If the previous one or two boots crashed mid-load, don't try
    // again — fall straight through to rule-based routing. This
    // prevents the iOS "A problem repeatedly occurred" lockout.
    if (skipModelDueToCrashes) {
      console.warn(
        `Search router: skipping model load after ${crashCount} unfinished attempts; ` +
        'falling back to rule-based routing (bangs + DDG).'
      );
      modelFailed = true;
      setStatus('failed', 'Lite mode (model disabled after repeated crashes)');
      showError(
        'Lite mode active after a previous load failed. ' +
        'Bangs and Enter still route correctly.'
      );
      loadingOverlay.classList.remove('active');
      document.querySelector('.footer-links').classList.add('visible');
      modelLoadPromise = Promise.resolve(false);
      return modelLoadPromise;
    }

    loadingOverlay.classList.add('active');
    setStatus('loading', 'Embedding Model Loading…');
    markLoadStart();
    modelLoadPromise = (async () => {
      let lastErr = null;
      for (let attempt = 0; attempt <= MODEL_LOAD_RETRIES; attempt++) {
        try {
          if (attempt > 0) {
            const wait = MODEL_LOAD_RETRY_BASE_MS * Math.pow(2, attempt - 1);
            console.warn(`Search router: retrying model load (attempt ${attempt + 1}) after ${wait}ms`);
            setStatus('loading', `Embedding Model Loading… (retry ${attempt})`);
            await sleep(wait);
          } else {
            console.log('Search router: initializing…');
          }
          const { raw, model } = await loadModelOnce();
          // Convert to typed arrays once. Vectors are L2-normalized at
          // build time, so cosine == dot product (no per-query sqrt).
          routes = raw.map(r => ({
            key: r.key,
            vectors: r.vectors.map(v => Float32Array.from(v)),
          }));
          extractor = model;
          modelReady = true;
          // We made it — clear the in-progress flag and reset the
          // crash counter so the next visit boots normally even if
          // there were transient failures earlier in the session.
          markLoadEnd();
          writeCrashCount(0);
          setStatus('ready', 'Embedding Model Ready');
          const total = routes.reduce((n, r) => n + r.vectors.length, 0);
          console.log(`Search router: ready (${routes.length} routes, ${total} vectors)`);
          if (!isRedirecting) {
            loadingOverlay.classList.remove('active');
            document.querySelector('.footer-links').classList.add('visible');
          }
          updateHint();
          return true;
        } catch (err) {
          lastErr = err;
          console.error(`Search router: init attempt ${attempt + 1} failed`, err);
          if (!isTransientError(err)) break;
        }
      }
      // Controlled failure path (we caught the error). Clear the
      // in-progress flag so we don't false-positive a "crash" next boot.
      markLoadEnd();
      modelFailed = true;
      const msg = (lastErr && lastErr.message) || String(lastErr);
      setStatus('failed', 'Embedding Model Failed: ' + msg);
      showError(msg);
      loadingOverlay.classList.remove('active');
      document.querySelector('.footer-links').classList.add('visible');
      return false;
    })();
    return modelLoadPromise;
  }

  // ───────────────────────────────────────────────────────────────────────
  // Routing
  // ───────────────────────────────────────────────────────────────────────

  /**
   * Dot product. Inputs MUST both be L2-normalized — then this equals
   * cosine similarity. We assert that on the route side at load time
   * (vectors come from a build-time pipeline with normalize=true) and
   * on the query side via `normalize: true` in the extractor call.
   */
  function dot(a, b) {
    const len = a.length;
    let s = 0;
    for (let i = 0; i < len; i++) s += a[i] * b[i];
    return s;
  }

  /**
   * Score a query against every route. Each route's score is the *max*
   * similarity over its example vectors (nearest-neighbor pooling — more
   * robust than averaging when example phrasings vary widely).
   */
  function scoreAll(qVec) {
    const scores = new Array(routes.length);
    for (let i = 0; i < routes.length; i++) {
      const vecs = routes[i].vectors;
      let best = -1;
      for (let j = 0; j < vecs.length; j++) {
        const s = dot(qVec, vecs[j]);
        if (s > best) best = s;
      }
      scores[i] = { key: routes[i].key, score: best };
    }
    scores.sort((a, b) => b.score - a.score);
    return scores;
  }

  function classifyRules(query) {
    if (query.startsWith('!')) {
      const cmd = query.split(' ', 1)[0].slice(1);
      if (BANG_MAP[cmd]) return BANG_MAP[cmd];
    }
    if (!query.includes(' ') && (DOMAIN_RE.test(query) || LOCALHOST_RE.test(query))) {
      return 'direct';
    }
    return null;
  }

  /**
   * Returns { key, scores } where `scores` is sorted desc by similarity
   * (or [] when classification was rule-based / model not ready).
   * `staleCheck` is an optional () => boolean; if it ever returns true
   * we abort and return null so the caller can drop a stale result.
   */
  async function classify(rawQuery, staleCheck) {
    const q = rawQuery.toLowerCase().trim();
    if (!q) return { key: 'ddg', scores: [] };

    const ruleKey = classifyRules(q);
    if (ruleKey) return { key: ruleKey, scores: [] };

    if (!modelReady) return { key: 'ddg', scores: [] };

    try {
      const output = await extractor([q], { pooling: 'mean', normalize: true });
      if (staleCheck && staleCheck()) return null;
      const qVec = output.tolist()[0];
      const scores = scoreAll(qVec);
      const top = scores[0];
      const key = top.score >= SIMILARITY_THRESHOLD ? top.key : 'ddg';
      return { key, scores };
    } catch (e) {
      console.error('Inference error', e);
      return { key: 'ddg', scores: [] };
    }
  }

  // ───────────────────────────────────────────────────────────────────────
  // UI updates (always cancellable; latest input wins)
  // ───────────────────────────────────────────────────────────────────────
  let hintSeq = 0;

  function clearHint() {
    hint.classList.remove('active');
    document.documentElement.style.setProperty('--engine-color', 'transparent');
    delete document.body.dataset.engine;
    scoresPanel.classList.remove('active');
    scoresPanel.replaceChildren();
  }

  function renderScores(result) {
    if (!result.scores.length) {
      scoresPanel.classList.remove('active');
      scoresPanel.replaceChildren();
      return;
    }
    // Build with DOM nodes (avoids innerHTML / XSS surface). Each row
    // is rendered as a real <button> so it's keyboard-focusable and
    // the click-to-override behavior is announced correctly to screen
    // readers — pressing Enter/Space on a chip routes to that engine
    // exactly as a click does.
    const frag = document.createDocumentFragment();
    for (const s of result.scores) {
      const pct = Math.round(s.score * 100);
      const isBest = s.key === result.key;
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'score-row';
      row.dataset.engine = s.key;
      row.setAttribute('aria-label', `Route to ${engines[s.key].name} (${pct}% match)`);
      row.innerHTML =
        `<span class="score-label">${engines[s.key].name}</span>` +
        `<div class="score-bar"><div class="score-fill${isBest ? ' best' : ''}" style="width:${pct}%"></div></div>` +
        `<span class="score-val">${pct}%</span>`;
      frag.appendChild(row);
    }
    scoresPanel.replaceChildren(frag);
    scoresPanel.classList.add('active');
  }

  async function updateHint() {
    const q = search.value.trim();
    const mySeq = ++hintSeq;
    if (!q) { clearHint(); return; }

    const result = await classify(q, () => mySeq !== hintSeq);
    if (!result || mySeq !== hintSeq) return;       // a newer keystroke is in flight

    const engine = engines[result.key];
    hint.textContent = engine.name;
    hint.classList.add('active');
    document.documentElement.style.setProperty('--engine-color', engine.color);
    document.body.dataset.engine = result.key;
    // Store the current route key on the hint so click-to-route knows where to go
    hint.dataset.routeKey = result.key;
    renderScores(result);
  }

  // ───────────────────────────────────────────────────────────────────────
  // Routing / redirect
  // ───────────────────────────────────────────────────────────────────────
  function buildTargetUrl(rawQuery, key) {
    let q = rawQuery.trim();
    if (q.startsWith('!')) {
      const parts = q.split(/\s+/);
      if (parts.length > 1) q = parts.slice(1).join(' ');
    }
    return key === 'direct'
      ? engines.direct.url(q)
      : engines[key].url(encodeURIComponent(q));
  }

  /**
   * @param {string}  rawQuery  the user's text
   * @param {boolean} immediate true → navigate without showing the
   *                            "redirecting…" overlay (used when the
   *                            user explicitly clicks a destination)
   * @param {string?} overrideKey  if provided, route to this engine
   *                            *instead* of asking the model to
   *                            classify. This is how the engine-hint
   *                            click-to-route and the score-chip
   *                            click-to-override paths bypass the
   *                            usual semantic decision.
   */
  async function performRoute(rawQuery, immediate = false, overrideKey = null) {
    if (!rawQuery || !rawQuery.trim()) return;
    // Defensive: if a previous route was already armed (rapid double
    // Enter, or Enter while a redirect is pending), cancel it first so
    // we don't stack timers / redirect twice.
    if (routeTimer) { clearTimeout(routeTimer); routeTimer = null; }

    let key;
    if (overrideKey && engines[overrideKey]) {
      key = overrideKey;
    } else {
      const result = await classify(rawQuery);
      key = result.key;
    }
    const url = buildTargetUrl(rawQuery, key);

    if (immediate) {
      location.replace(url);
      return;
    }
    display.textContent = engines[key].name;
    overlay.style.display = 'flex';
    search.blur();
    // Reset width to 0 first so the transition has somewhere to go even
    // if the bar was previously filled by a cancelled route.
    progress.style.width = '0%';
    requestAnimationFrame(() => { progress.style.width = '100%'; });
    routeTimer = setTimeout(() => location.replace(url), ROUTE_DELAY_MS);
  }

  // ───────────────────────────────────────────────────────────────────────
  // Theme toggle (with localStorage persistence)
  // ───────────────────────────────────────────────────────────────────────
  const THEME_KEY = 'divid3-theme';
  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.classList.add('light');
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
      document.documentElement.classList.remove('light');
    }
    // Keep the iOS Safari status-bar / Android browser-chrome color in
    // sync with the user's chosen theme. Without this, toggling the
    // theme leaves the toolbar painted in whatever the OS-level
    // `prefers-color-scheme` says — which on iOS can flip mid-session
    // (e.g. when the device crosses an Auto-mode threshold) and looks
    // like the page itself "randomly" changing modes.
    const tc = document.getElementById('theme-color');
    if (tc) tc.setAttribute('content', theme === 'light' ? '#ffffff' : '#000000');
  }
  function getSavedTheme() {
    try {
      const t = localStorage.getItem(THEME_KEY);
      if (t === 'light' || t === 'dark') return t;
    } catch (_) {}
    return null;
  }
  function saveTheme(theme) {
    try { localStorage.setItem(THEME_KEY, theme); } catch (_) {}
  }
  function toggleTheme() {
    const isLight = document.documentElement.classList.contains('light');
    const next = isLight ? 'dark' : 'light';
    applyTheme(next);
    saveTheme(next);
  }
  // Initialise: saved preference wins over system default
  const savedTheme = getSavedTheme();
  if (savedTheme) applyTheme(savedTheme);
  themeToggle.addEventListener('click', toggleTheme);

  // ───────────────────────────────────────────────────────────────────────
  // Keyboard shortcuts overlay
  // ───────────────────────────────────────────────────────────────────────
  function showShortcuts() { shortcutsOverlay.classList.add('active'); }
  function hideShortcuts() { shortcutsOverlay.classList.remove('active'); }
  shortcutsOverlay.addEventListener('click', e => {
    if (e.target === shortcutsOverlay) hideShortcuts();
  });

  // ───────────────────────────────────────────────────────────────────────
  // Smart paste: strip protocol from pasted URLs so "https://github.com"
  // classifies as a direct link instead of a search query.
  // ───────────────────────────────────────────────────────────────────────
  search.addEventListener('paste', e => {
    const text = (e.clipboardData || window.clipboardData)?.getData('text') || '';
    const trimmed = text.trim();
    // If the clipboard contains only a URL with protocol, strip it.
    if (/^https?:\/\//i.test(trimmed) && !trimmed.includes(' ')) {
      const withoutProtocol = trimmed.replace(/^https?:\/\//i, '');
      // Only strip if the result still looks like a domain (so we don't
      // accidentally mangle search queries that happen to start with http).
      if (DOMAIN_RE.test(withoutProtocol) || LOCALHOST_RE.test(withoutProtocol)) {
        e.preventDefault();
        const start = search.selectionStart || 0;
        const end = search.selectionEnd || 0;
        const val = search.value;
        search.value = val.slice(0, start) + withoutProtocol + val.slice(end);
        search.selectionStart = search.selectionEnd = start + withoutProtocol.length;
        // Trigger the same flow as a normal input event
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updateHint, INPUT_DEBOUNCE_MS);
      }
    }
  });

  // ───────────────────────────────────────────────────────────────────────
  // Event wiring
  // ───────────────────────────────────────────────────────────────────────
  let debounceTimer;
  search.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updateHint, INPUT_DEBOUNCE_MS);
  });

  // Enter routes the current query. Other shortcuts are intentionally
  // handled at the document level (below) — registering them here was a
  // long-standing bug: pressing `t`, `?` or `/` while typing in the
  // search input would `preventDefault` the keystroke and (for `t`)
  // silently flip the theme. That's why some users reported the page
  // "randomly turning to light mode when typing a query".
  search.addEventListener('keydown', e => {
    if (e.key === 'Enter' && search.value.trim()) {
      performRoute(search.value);
    }
  });

  /** True when the keyboard event originated inside an editable element. */
  function isTypingTarget(target) {
    if (!target) return false;
    const tag = target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
    if (target.isContentEditable) return true;
    return false;
  }

  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    // Don't hijack characters the user is typing into the input.
    if (isTypingTarget(e.target)) return;

    if (e.key === '?') {
      e.preventDefault();
      showShortcuts();
    } else if (e.key.toLowerCase() === 't') {
      e.preventDefault();
      toggleTheme();
    } else if (e.key === '/') {
      e.preventDefault();
      search.focus();
    }
  });

  function cancelRoute() {
    if (routeTimer) { clearTimeout(routeTimer); routeTimer = null; }
    overlay.style.display = 'none';
    progress.style.width = '0%';
    search.focus();
  }
  cancel.addEventListener('click', cancelRoute);
  // Escape while the redirect overlay is up should cancel it too. Plain
  // keyboard accessibility — useful on desktop, no harm on mobile.
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (overlay.style.display === 'flex') {
        e.preventDefault();
        cancelRoute();
        return;
      }
      if (shortcutsOverlay.classList.contains('active')) {
        e.preventDefault();
        hideShortcuts();
        return;
      }

    }
  });

  // Rotating placeholder (decorative)
  const placeholders = [
    'Type to search...', '2 + 2 * 42', 'pizza near me', '!yt lofi hip hop',
    'explain quantum gravity', 'github.com', 'image of a black hole',
    'latest AI news', '!gh gemini-cli', 'integral of x^2', 'distance to moon'
  ];
  let pIdx = 0;
  setInterval(() => {
    if (!search.value && document.activeElement !== search) {
      pIdx = (pIdx + 1) % placeholders.length;
      search.placeholder = placeholders[pIdx];
    }
  }, 3000);

  // ───────────────────────────────────────────────────────────────────────
  // Click-to-route
  //
  //  - Clicking the engine hint instantly routes to the engine the
  //    model already picked (a one-tap confirmation).
  //  - Clicking ANY score chip overrides the model's pick and routes
  //    to that engine instead. The chips are real <button>s so
  //    keyboard users get Enter/Space for free; a native click event
  //    fires for both pointer and keyboard activations.
  //
  // Both paths use `performRoute(query, immediate=true, overrideKey)`,
  // which skips the "redirecting…" overlay because the user has just
  // told us exactly where to go.
  // ───────────────────────────────────────────────────────────────────────
  hint.addEventListener('click', () => {
    const key = hint.dataset.routeKey;
    if (!key || !search.value.trim()) return;
    performRoute(search.value, true, key);
  });

  // Event delegation: one listener on the panel survives every
  // re-render of its children. `closest('.score-row')` lets the user
  // click anywhere inside the chip (label, bar, percentage).
  scoresPanel.addEventListener('click', e => {
    const row = e.target.closest('.score-row');
    if (!row || !scoresPanel.contains(row)) return;
    const key = row.dataset.engine;
    if (!key || !search.value.trim()) return;
    performRoute(search.value, true, key);
  });

  // ───────────────────────────────────────────────────────────────────────
  // ?q=… auto-redirect entry point
  //
  // Order matters: we kick off `initModel()` immediately so the network
  // fetch starts in parallel with the rest of script init, then await
  // it from the redirect path. No polling — exactly one resolution.
  // ───────────────────────────────────────────────────────────────────────
  const initPromise = initModel();

  if (qParam !== null) {
    const trimmed = qParam.trim();
    if (!trimmed) {
      // Empty query → just show the page; nothing to redirect to.
      loadingOverlay.classList.remove('active');
    } else {
      search.value = trimmed;
      (async () => {
        const ok = await initPromise;
        if (ok) {
          performRoute(trimmed, true);
        } else {
          console.warn('Search router: model failed, falling back to DuckDuckGo');
          location.replace(engines.ddg.url(encodeURIComponent(trimmed)));
        }
      })();
    }
  }
</script>
</body>
</html>
