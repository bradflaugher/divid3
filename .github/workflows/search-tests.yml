name: Search E2E Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'setup.html'
      - 'opensearch.xml'
      - 'search-embeddings.json'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'serve.json'
      - 'models/**'
      - 'scripts/search_phrases.json'
      - 'scripts/generate_search_embeddings.py'
      - '.github/workflows/search-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'setup.html'
      - 'opensearch.xml'
      - 'search-embeddings.json'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'serve.json'
      - 'models/**'
      - 'scripts/search_phrases.json'
      - 'scripts/generate_search_embeddings.py'
      - '.github/workflows/search-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        # We run four projects: chromium, firefox, webkit (desktop
        # Safari engine), and mobile-safari (iPhone 13 / WebKit).
        # mobile-safari rides on the same webkit binary, so installing
        # chromium + firefox + webkit covers all four.
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
