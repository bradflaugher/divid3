name: Search E2E Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'setup.html'
      - 'opensearch.xml'
      - 'search-embeddings.json'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'serve.json'
      - 'models/**'
      - 'scripts/search_phrases.json'
      - 'scripts/generate_search_embeddings.py'
      - '.github/workflows/search-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'setup.html'
      - 'opensearch.xml'
      - 'search-embeddings.json'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'serve.json'
      - 'models/**'
      - 'scripts/search_phrases.json'
      - 'scripts/generate_search_embeddings.py'
      - '.github/workflows/search-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Each Playwright project (chromium / firefox / webkit / mobile-safari)
    # runs in its own job. Sharding by browser keeps each shard well under
    # the timeout and lets failures be diagnosed per-engine.
    # mobile-safari rides on the webkit binary, so the install step picks
    # the right binary based on the project name.
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, mobile-safari]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.project == 'mobile-safari' && 'webkit' || matrix.project }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14
